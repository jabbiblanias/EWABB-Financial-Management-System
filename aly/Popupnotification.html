<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Popup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
 <!-- Overlay -->
  <div id="notificationModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <!-- Modal Container -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl h-[80vh] p-6 relative flex flex-col">

      <!-- Close Button -->
      <button onclick="document.getElementById('notificationModal').classList.add('hidden')"
        class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 transition text-2xl font-bold">
        &times;
      </button>

      <!-- Header -->
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Notifications</h2>

      <!-- Action Buttons -->
      <div class="flex items-center gap-3 mb-4">
        <button class="bg-blue-100 hover:bg-blue-200 text-sm font-semibold px-4 py-2 rounded-full border border-blue-300 flex items-center gap-2 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          Mark as read
        </button>
      </div>

      <!-- Notification Table (scrollable) -->
      <div class="overflow-y-auto rounded-lg border border-gray-200 flex-1">
        <table class="min-w-full table-auto">
          <thead class="bg-gray-50 text-sm font-semibold text-gray-800 sticky top-0">
            <tr>
              <th class="px-4 py-3 text-left"><input type="checkbox" /></th>
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">From</th>
              <th class="px-4 py-3 text-left">Subject</th>
              <th class="px-4 py-3 text-right">Sent</th>
            </tr>
          </thead>
          <tbody class="text-sm text-gray-700 divide-y divide-gray-200">
            <!-- Example Notification Rows -->
            <tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3"><input type="checkbox" /></td>
              <td class="px-4 py-3">1</td>
              <td class="px-4 py-3 font-medium">System</td>
              <td class="px-4 py-3">Your account has been updated.</td>
              <td class="px-4 py-3 text-right text-gray-500">Sep 3, 2025</td>
            </tr>
            <tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3"><input type="checkbox" /></td>
              <td class="px-4 py-3">2</td>
              <td class="px-4 py-3 font-medium">Admin</td>
              <td class="px-4 py-3">New security policies applied.</td>
              <td class="px-4 py-3 text-right text-gray-500">Sep 2, 2025</td>
            </tr>
            <tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3"><input type="checkbox" /></td>
              <td class="px-4 py-3">3</td>
              <td class="px-4 py-3 font-medium">Support</td>
              <td class="px-4 py-3">Your ticket has been resolved.</td>
              <td class="px-4 py-3 text-right text-gray-500">Sep 1, 2025</td>
            </tr>
            <!-- More rows -->
            <tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3"><input type="checkbox" /></td>
              <td class="px-4 py-3">4</td>
              <td class="px-4 py-3 font-medium">System</td>
              <td class="px-4 py-3">Maintenance scheduled tomorrow.</td>
              <td class="px-4 py-3 text-right text-gray-500">Aug 31, 2025</td>
            </tr>
            <tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3"><input type="checkbox" /></td>
              <td class="px-4 py-3">5</td>
              <td class="px-4 py-3 font-medium">Updates</td>
              <td class="px-4 py-3">New features have been added.</td>
              <td class="px-4 py-3 text-right text-gray-500">Aug 30, 2025</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</body>
</html>
