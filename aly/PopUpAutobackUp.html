<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <title>Auto Backup Popup</title>
 <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
  
  <!-- Modal -->
  <div id="autoBackupModal" class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-md relative">
    
    <!-- Close Button -->
    <button
      onclick="document.getElementById('autoBackupModal').classList.add('hidden')"
      class="absolute top-2 right-3 text-gray-500 hover:text-gray-800 text-2xl font-bold">
      &times;
    </button>

    <!-- Modal Content -->
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Auto Backup</h2>
    <form method="POST">
      <label class="block mb-2 font-medium text-gray-700">Backup Frequency:</label>
      <select name="frequency" class="border rounded p-2 mb-4 w-full">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>

      <label class="block mb-2 font-medium text-gray-700">Storage:</label>
      <select name="storage" class="border rounded p-2 mb-6 w-full">
        <option value="local">Local</option>
        <option value="cloud">Cloud</option>
      </select>

      <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 shadow w-full">
        Save Auto Backup
      </button>
    </form>
  </div>

</body>
</html>
