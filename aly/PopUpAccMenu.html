<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-gray-900 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-lg shadow-md w-64 p-2">
      <!-- Profile -->
      <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-md cursor-pointer">
        <i data-lucide="user" class="w-5 h-5 text-gray-700"></i>
        <span class="text-gray-800">Profile</span>
      </div>

      <hr class="my-1 border-gray-200" />

      <!-- Log out -->
      <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-md cursor-pointer">
        <i data-lucide="log-out" class="w-5 h-5 text-gray-700"></i>
        <span class="text-gray-800">Log out</span>
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
