<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Receipt</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-sm w-full">
        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Transaction ID</span>
                <span class="font-semibold">00124356678</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Account No.</span>
                <span class="font-semibold">12345678910</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Member Name</span>
                <span class="font-semibold">Mark Anthony Dela Cruz</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Transaction Type</span>
                <span class="font-semibold">Savings</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Date and Time</span>
                <span class="font-semibold">March 12, 2025 10:30 am</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Amount</span>
                <span class="font-semibold">10,000</span>
            </div>
        </div>
        <div class="mt-8 flex justify-between items-center">
            <button class="text-blue-600 font-semibold">Close</button>
            <button class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg">Print</button>
        </div>
    </div>
</body>
</html>
