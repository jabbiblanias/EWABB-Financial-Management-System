<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10 font-sans">

  <!-- Container with border -->
  <div class="bg-white border border-gray-300 rounded-lg shadow-sm p-4 max-w-6xl mx-auto">

    <!-- Action Buttons -->
    <div class="flex items-center gap-3 mb-4">
      <button class="bg-blue-100 hover:bg-gray-200 text-sm font-semibold px-4 py-2 rounded-full border border-gray-300 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        Mark as read
      </button>
    </div>

    <!-- Notification Table -->
    <div class="overflow-x-auto">
      <table class="min-w-full table-auto">
        <thead class="bg-gray-100 text-sm font-semibold text-gray-800 border-t border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-left"><input type="checkbox" /></th>
            <th class="px-4 py-3 text-left">#</th>
            <th class="px-4 py-3 text-left">From</th>
            <th class="px-4 py-3 text-left">Subject</th>
            <th class="px-4 py-3 text-right">Sent</th>
          </tr>
        </thead>
        <tbody class="text-sm text-gray-700">
          <!-- Example Notification Row -->
          <tr class="border-b hover:bg-gray-50">
            <td class="px-4 py-3"><input type="checkbox" /></td>
            <td class="px-4 py-3">1</td>
            <td class="px-4 py-3">System</td>
            <td class="px-4 py-3">Your account has been updated.</td>
            <td class="px-4 py-3 text-right">Sep 3, 2025</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</body>
</html>
