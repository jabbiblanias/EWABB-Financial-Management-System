<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
 <meta charset="UTF-8" />
 <title>Restore From File Popup</title>
 <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

  <!-- Modal -->
  <div id="restoreModal" class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-md relative">

    <!-- Close Button -->
    <button
      onclick="document.getElementById('restoreModal').classList.add('hidden')"
      class="absolute top-2 right-3 text-gray-500 hover:text-gray-800 text-2xl font-bold">
      &times;
    </button>

    <!-- Modal Content -->
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Restoring from File</h2>

    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="backup_file" accept=".sql,.zip,.bak"
             class="block w-full text-gray-700 border rounded p-2 mb-6" required>
      <button type="submit"
              onclick="return confirm('This will overwrite current data. Are you sure?');"
              class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 shadow w-full">
        Restore Now
      </button>
    </form>
  </div>

</body>
</html>
