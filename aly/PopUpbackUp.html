<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Backup Popup</title>
 <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

 <!-- Modal -->
 <div id="backupModal" class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-md relative">

   <!-- Close Button -->
   <button
     onclick="document.getElementById('backupModal').classList.add('hidden')"
     class="absolute top-2 right-3 text-gray-500 hover:text-gray-800 text-2xl font-bold">
     &times;
   </button>

   <!-- Modal Content -->
   <h2 class="text-lg font-semibold text-gray-800 mb-2">Create Backup</h2>
   <p class="text-sm text-gray-600 mb-4">Choose where to store the backup.</p>

   <form method="POST">
     <div class="mb-4">
       <label class="inline-flex items-center mr-4">
         <input type="radio" name="backup_location" value="local" class="form-radio text-blue-600" checked>
         <span class="ml-2 text-gray-800">Local Server</span>
       </label>
       <label class="inline-flex items-center">
         <input type="radio" name="backup_location" value="cloud" class="form-radio text-blue-600">
         <span class="ml-2 text-gray-800">Cloud (Google Drive/S3)</span>
       </label>
     </div>
     <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow">
       Backup now
     </button>
   </form>
 </div>

</body>
</html>
