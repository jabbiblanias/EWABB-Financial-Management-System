<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWABB Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
<!-- Sidebar -->
      <aside class="w-64 max-h-screen bg-white border-r">
        <div class="p-6 text-2xl font-bold text-[#1f2b6c]">EWABB</div>
        <nav class="mt-6">
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Dashboard </a>
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Transactions</a>
            <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Members</a>
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"> <span class="w-5 mr-3 inline-block"></span>Financial Reports </a>
             <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Loans</a>
           <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Appointments</a>
         <a href="#" class="flex items-center px-6 py-3 text-[#3d5af1] font-semibold bg-[#f1f5ff]">  <span class="w-5 mr-3 inline-block"></span> Programs</a>

                </nav>
      </aside>
    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
      <!-- Top bar -->
      <header class="flex justify-between items-center px-6 py-4 border-b border-gray-200 bg-white">
        <h2 class="text-lg font-semibold">Program</h2>
        <div class="flex items-center space-x-4">
          <input type="text" placeholder="Search for member" class="px-4 py-2 border border-gray-300 rounded-full w-64" />
          <div class="w-10 h-10 rounded-full bg-gray-200"></div>
          <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-500 text-white flex items-center justify-center rounded-full font-semibold">BK</div>
            <span class="text-sm">Bookkeeper</span>
          </div>
        </div>
      </header>

        <!-- Action buttons -->
        <div class="flex justify-between items-center px-6 py-4 bg-gray-50 border-b border-gray-200">
             <button class="bg-blue-600 text-white px-6 py-2 rounded-md font-medium hover:bg-blue-700">Add New</button>
        </div>

      <!-- Table -->
      <div class="px-6 py-4">
        <div class="border border-gray-200 rounded-md overflow-hidden">
          <table class="min-w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Bussiness Program</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Date Start</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Date End</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Profits</th>
              </tr>
            </thead>
            <tbody class="bg-white">
              <tr class="border-b border-gray-200">
                <td class="px-6 py-3">Bussiness Program 1</td>
                <td class="px-4 py-3">August 16,2025 3:00 pm</td>
                <td class="px-4 py-3">August 16,2025 3:00 pm</td>
                <td class="px-4 py-3">₱ 12,000</td>
              </tr>
              <tr><td class="px-4 py-6" colspan="6"></td></tr>
              <tr><td class="px-4 py-6" colspan="6"></td></tr>
            </tbody>
          </table>
        </div>

       <!-- Pagination -->
    <div class="flex justify-end items-center space-x-2 mt-4">
      <button class="text-blue-600 hover:underline">Previous</button>
      <button class="px-3 py-1 rounded-full bg-blue-600 text-white">1</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">2</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">3</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">4</button>
      <button class="text-blue-600 hover:underline">Next</button>
    </div>


      </div>
    </div>
  </div>
</body>
</html>
