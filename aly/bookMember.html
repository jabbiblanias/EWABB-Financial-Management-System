<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWABB Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
<!-- Sidebar -->
      <aside class="w-64 max-h-screen bg-white border-r">
        <div class="p-6 text-2xl font-bold text-[#1f2b6c]">EWABB</div>
        <nav class="mt-6">
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Dashboard </a>
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Transactions</a>
          <a href="#" class="flex items-center px-6 py-3 text-[#3d5af1] font-semibold bg-[#f1f5ff]">  <span class="w-5 mr-3 inline-block"></span> Members</a>
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"> <span class="w-5 mr-3 inline-block"></span>Financial Reports </a>
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span> Loans</a>
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"> <span class="w-5 mr-3 inline-block"></span>Appointments</a>
          <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Programs</a>
                  

                </nav>
      </aside>
    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
      <!-- Top bar -->
      <header class="flex justify-between items-center px-6 py-4 border-b border-gray-200 bg-white">
        <h2 class="text-lg font-semibold">Members</h2>
        <div class="flex items-center space-x-4">
          <input type="text" placeholder="Search for member" class="px-4 py-2 border border-gray-300 rounded-full w-64" />
          <div class="w-10 h-10 rounded-full bg-gray-200"></div>
          <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-500 text-white flex items-center justify-center rounded-full font-semibold">BK</div>
            <span class="text-sm">Bookkeeper</span>
          </div>
        </div>
      </header>

      <!-- Tabs -->
      <div class="px-6 pt-4">
        <div class="flex border-b border-gray-200">
          <button class="px-4 py-2 text-blue-600 font-medium border-b-2 border-blue-600">Member Applications</button>
          <button class="px-4 py-2 text-gray-500 hover:text-blue-600">Approved Members</button>
        </div>
      </div>

      <!-- Table -->
      <div class="px-6 py-4">
        <div class="border border-gray-200 rounded-md overflow-hidden">
          <table class="min-w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Full Name</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Date of Birth</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Gender</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Civil Status</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Approval</th>
              </tr>
            </thead>
            <tbody class="bg-white">
              <tr class="border-b border-gray-200">
                <td class="px-6 py-3">Alexander Buates</td>
                <td class="px-6 py-3">April 30, 2025</td>
                <td class="px-6 py-3">Male</td>
                <td class="px-6 py-3">Single</td>
                <td class="px-6 py-3 flex gap-2">
                  <button class="w-6 h-6 flex items-center justify-center rounded-full border border-green-500 text-green-500 hover:bg-green-100">✓</button>
                  <button class="w-6 h-6 flex items-center justify-center rounded-full border border-red-500 text-red-500 hover:bg-red-100">✗</button>
                </td>
              </tr>
              <tr class="h-12"><td colspan="5"></td></tr>
              <tr class="h-12"><td colspan="5"></td></tr>
              <tr class="h-12"><td colspan="5"></td></tr>
            </tbody>
          </table>
        </div>

       <!-- Pagination -->
    <div class="flex justify-end items-center space-x-2 mt-4">
      <button class="text-blue-600 hover:underline">Previous</button>
      <button class="px-3 py-1 rounded-full bg-blue-600 text-white">1</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">2</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">3</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">4</button>
      <button class="text-blue-600 hover:underline">Next</button>
    </div>


      </div>
    </div>
  </div>
</body>
</html>
