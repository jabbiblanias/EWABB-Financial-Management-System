<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
      <!-- Sidebar -->
      {% include 'dashboard/partials/admin_nav.html' %}

      <!-- Main Content -->
      <div class="flex-1 flex flex-col">
        <!-- Top Bar -->
        <header class="flex justify-between items-center px-6 py-4 bg-white shadow-sm">
          <h1 class="text-xl font-semibold">Dashboard</h1>
          <div class="flex items-center space-x-4">
            <div class="relative">
              <input type="text" placeholder="Search for member" class="px-4 py-2 border rounded-full text-sm focus:outline-none" />
            </div>
            <div class="flex items-center space-x-2">
              <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center">A</div>
              <span class="text-sm font-medium">Admin</span>
            </div>
          </div>
        </header>

        <!-- Dashboard Stats -->
        <section class="p-6 grid grid-cols-3 gap-6">
          <div class="bg-white p-6 rounded-xl shadow-sm">
            <p class="text-sm text-gray-500">Total Savings</p>
            <p class="text-xl font-semibold">405,607</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm">
            <p class="text-sm text-gray-500">Total Money</p>
            <p class="text-xl font-semibold">3,000,457</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm">
            <p class="text-sm text-gray-500">Total Release</p>
            <p class="text-xl font-semibold">20,000</p>
          </div>
        </section>

        <!-- Chart -->
        <div class="bg-white p-6 m-6 rounded-lg shadow >
          <h2 class="text-gray-700  font-semibold mb-4">Monthly Supply Growth</h2>
          <div class="w-full h-64 bg-gray-50 flex items-center justify-center text-gray-400">
      </div>
    </div>
  </body>
</html>
