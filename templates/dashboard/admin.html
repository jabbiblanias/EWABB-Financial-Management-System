{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Dashboard</title>
    {% tailwind_css %} 
  </head>
  <body class="bg-gray-100 font-sans">
    <!-- Sidebar -->
      {% include 'dashboard/partials/admin_nav.html' %}
    <div class="flex h-screen">

      
<!-- Top Bar -->
<header class="flex justify-between items-center px-6 py-4 bg-white shadow-sm fixed top-0 left-64 right-0">
  <h1 class="text-xl font-semibold">Dashboard</h1>
  <div class="flex items-center space-x-4">
    <div class="relative">
      <input
        type="text"
        placeholder="Search for member"
        class="px-4 py-2 border rounded-full text-sm focus:outline-none"
      />
    </div>
    <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2">
              <div
                class="w-8 h-8 bg-[#3d5af1] rounded-full flex items-center justify-center text-white font-semibold"
              >
                AD
              </div>
              <span class="text-sm font-medium">Admin</span>
              <div class="dropdown dropdown-end">
                <svg tabindex="0" role="button"
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
                </svg>
                <!-- Dropdown Menu -->
                {% include "partials/profile_menu.html" %}
              </div>
            </div>
  </div>
</header>

      

      <!-- Main Content -->
      <div class="ml-64 mr-4 mt-[72px] flex-1">

        <!-- Dashboard Stats -->
        <section class="p-6 grid grid-cols-3 gap-6">
          <div class="bg-white p-6 rounded-xl shadow-sm">
            <p class="text-sm text-gray-500">Total Savings</p>
            <p class="text-xl font-semibold">405,607</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm">
            <p class="text-sm text-gray-500">Total Money</p>
            <p class="text-xl font-semibold">3,000,457</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm">
            <p class="text-sm text-gray-500">Total Release</p>
            <p class="text-xl font-semibold">20,000</p>
          </div>
        </section>

        <!-- Chart -->
        <div class="bg-white p-6 m-6 rounded-lg shadow" >
          <h2 class="text-gray-700  font-semibold mb-4">Monthly Supply Growth</h2>
          <div class="w-full h-64 bg-gray-50 flex items-center justify-center text-gray-400">
      </div>
    </div>
  </body>
</html>
