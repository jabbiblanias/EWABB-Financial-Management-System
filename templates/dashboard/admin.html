{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Dashboard</title>
    {% tailwind_css %} 
  </head>
  <body class="bg-gray-100 font-sans">
    <!-- Sidebar -->
      {% include 'dashboard/partials/admin_nav.html' %}
    <div class="flex h-screen">
      

      <!-- Main Content -->
<main class="ml-64 mr-4 mt-[72px] flex-1">
  <!-- Dashboard Stats -->
  <section class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 p-4 sm:p-6">

    <!-- Total Members -->
    <div class="bg-white p-5 rounded-2xl shadow-md hover:shadow-xl transition flex items-center justify-between">
      <div>
        <h3 class="text-sm text-gray-500">Total Members</h3>
        <p class="text-3xl font-bold text-blue-700 mt-1">{{ total_members }}</p>
      </div>
      <div class="relative w-16 h-16 flex items-center justify-center rounded-full bg-blue-100 shadow-[0_0_25px_5px_rgba(30,64,175,0.25)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24">
          <path fill="#1e40af" d="M5.5 7a3 3 0 1 1 6 0a3 3 0 0 1-6 0Zm3-5a5 5 0 1 0 0 10a5 5 0 0 0 0-10Zm7 0h-1v2h1a3 3 0 1 1 0 6h-1v2h1a5 5 0 0 0 0-10ZM0 19a5 5 0 0 1 5-5h7a5 5 0 0 1 5 5v2h-2v-2a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v2H0v-2Zm24 0a5 5 0 0 0-5-5h-1v2h1a3 3 0 0 1 3 3v2h2v-2Z"/>
        </svg>
      </div>
    </div>

    <!-- Total Loans -->
    <div class="bg-white p-5 rounded-2xl shadow-md hover:shadow-xl transition flex items-center justify-between">
      <div>
        <h3 class="text-sm text-gray-500">Total Loans</h3>
        <p class="text-3xl font-bold text-green-600 mt-1">₱{{ total_loan }}</p>
      </div>
      <div class="relative w-16 h-16 flex items-center justify-center rounded-full bg-green-100 shadow-[0_0_25px_5px_rgba(34,197,94,0.25)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24">
          <path fill="#16a34a" d="M7 15h3a1 1 0 0 0 0-2H7a1 1 0 0 0 0 2ZM19 5H5a3 3 0 0 0-3 3v9a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V8a3 3 0 0 0-3-3Zm1 12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-6h16Zm0-8H4V8a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1Z"/>
        </svg>
      </div>
    </div>

    <!-- Total Savings -->
    <div class="bg-white p-5 rounded-2xl shadow-md hover:shadow-xl transition flex items-center justify-between">
      <div>
        <h3 class="text-sm text-gray-500">Total Savings</h3>
        <p class="text-3xl font-bold text-purple-600 mt-1">₱{{ total_savings }}</p>
      </div>
      <div class="relative w-16 h-16 flex items-center justify-center rounded-full bg-purple-100 shadow-[0_0_25px_5px_rgba(147,51,234,0.25)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-8" viewBox="0 0 16 16">
          <path fill="#7e22ce" d="M13.973 7.722c.018.173.027.354.027.545c0 1.297-.452 2.169-.89 2.715a3.603 3.603 0 0 1-.603.596a2.61 2.61 0 0 1-.236.162l-.009.005a.5.5 0 0 0-.262.44V13.5a.5.5 0 0 1-.5.5H11a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1h-.5a.5.5 0 0 1-.5-.5v-.603a.5.5 0 0 0-.45-.498a2.855 2.855 0 0 1-.464-.143a3.16 3.16 0 0 1-1.063-.707c-.443-.45-.714-1.042-.86-1.453c-.143-.409-.471-.779-.94-.911A.307.307 0 0 1 2 8.89v-.794a.29.29 0 0 1 .21-.279c.485-.139.809-.531.946-.945c.112-.34.31-.776.632-1.103a4.818 4.818 0 0 1 1.262-.906c.039-.02.07-.034.09-.043l.02-.01l.004-.001a.5.5 0 0 0 .303-.46V2.675a7.2 7.2 0 0 0 .7.527c.317.208.687.405 1.074.51c.114-.328.27-.64.464-.928h-.006c-.279-.029-.62-.18-.985-.419a7.02 7.02 0 0 1-.94-.757a.774.774 0 0 0-.827-.15a.76.76 0 0 0-.48.704v1.877a6.09 6.09 0 0 0-1.39 1.028c-.477.482-.736 1.084-.87 1.491c-.056.167-.168.268-.272.297A1.29 1.29 0 0 0 1 8.095v.795c0 .585.389 1.098.951 1.257a.43.43 0 0 1 .27.281c.166.472.498 1.223 1.09 1.823A4.158 4.158 0 0 0 5 13.287v.213A1.5 1.5 0 0 0 6.5 15H7a1 1 0 0 0 1-1h2a1 1 0 0 0 1 1h.5a1.5 1.5 0 0 0 1.5-1.5v-1.043a4.61 4.61 0 0 0 .89-.85c.562-.7 1.11-1.788 1.11-3.34c0-.65-.092-1.232-.27-1.752a4.01 4.01 0 0 1-.757 1.207Z"/>
        </svg>
      </div>
    </div>

    <!-- Pending Approvals -->
    <div class="bg-white p-5 rounded-2xl shadow-md hover:shadow-xl transition flex items-center justify-between">
      <div>
        <h3 class="text-sm text-gray-500">Pending Approvals</h3>
        <p class="text-3xl font-bold text-red-500 mt-1">{{ approvals }}</p>
      </div>
      <div class="relative w-16 h-16 flex items-center justify-center rounded-full bg-red-100 shadow-[0_0_25px_5px_rgba(239,68,68,0.25)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 48 48">
          <path fill="#dc2626" d="m24 3l4.7 3.6l5.8-.8l2.2 5.5l5.5 2.2l-.8 5.8L45 24l-3.6 4.7l.8 5.8l-5.5 2.2l-2.2 5.5l-5.8-.8L24 45l-4.7-3.6l-5.8.8l-2.2-5.5l-5.5-2.2l.8-5.8L3 24l3.6-4.7l-.8-5.8l5.5-2.2l2.2-5.5l5.8.8z"/>
          <path fill="#fecaca" d="M34.6 14.6L21 28.2l-5.6-5.6l-2.8 2.8l8.4 8.4l16.4-16.4z"/>
        </svg>
      </div>
    </div>

  </section>


        <!-- Chart -->
        <div class="bg-white p-6 m-6 rounded-lg shadow" >
          <h2 class="text-gray-700  font-semibold mb-4">Monthly Supply Growth</h2>
          <div class="w-full h-64 bg-gray-50 flex items-center justify-center text-gray-400">
          </main>
    </div>
  </body>
</html>
