{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWABB Dashboard</title>
  {% tailwind_css %}
  <script src="{% static 'dashboard/js/chart.umd.min.js' %}"></script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
    {% include 'dashboard/partials/bookkeeper_nav.html' %}

    <!-- Main Content -->
    <div class="ml-64 mr-4 mt-[72px] flex-1">
      <section class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 p-4 sm:p-6">
          <div class="bg-white p-4 rounded-2xl shadow hover:shadow-lg transition">
          <h3 class="text-sm text-gray-500">Total Members</h3>
          <p class="text-3xl font-bold text-blue-700 mt-1">{{ total_members }}</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow hover:shadow-lg transition">
          <h3 class="text-sm text-gray-500">Total Loans</h3>
          <p class="text-3xl font-bold text-green-600 mt-1">₱2.8M</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow hover:shadow-lg transition">
          <h3 class="text-sm text-gray-500">Total Savings</h3>
          <p class="text-3xl font-bold text-purple-600 mt-1">₱4.3M</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow hover:shadow-lg transition">
          <h3 class="text-sm text-gray-500">Pending Verifications</h3>
          <p class="text-3xl font-bold text-red-500 mt-1">14</p>
        </div>
        </section>    

        <!-- Members Growth -->
      <div class="mt-5 mx-2 sm:mx-6 bg-white p-4 sm:p-6 rounded-2xl shadow border border-gray-100">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-5">
          <div>
            <h2 class="text-lg sm:text-xl font-semibold text-[#1f2b6c]">Savings Growth Overview</h2>
            <p class="text-sm text-gray-500 mt-1">Track your savings trend over time</p>
          </div>

          <!-- Dropdown -->
          <div class="mt-3 md:mt-0">
            <select id="timeframe"
              class="border-gray-300 focus:ring-2 focus:ring-blue-400 text-sm rounded-lg p-2 w-full md:w-auto">
              <option value="daily">Daily</option>
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
        </div>

        <!-- Chart container -->
        <div class="relative w-full h-[260px] sm:h-[320px] md:h-[380px]">
          <canvas id="savingsChart"></canvas>
        </div>
      </div>
    </main>
  </div>
  <script>
        const datasets = {
          daily: {
            labels: JSON.parse('{{ daily_labels|safe }}'),
            data: JSON.parse('{{ daily_data|safe }}')
          },
          monthly: {
            labels: JSON.parse('{{ monthly_labels|safe }}'),
            data: JSON.parse('{{ monthly_data|safe }}')
          },
          yearly: {
            labels: JSON.parse('{{ yearly_labels|safe }}'),
            data: JSON.parse('{{ yearly_data|safe }}')
          }
        };

        const ctx = document.getElementById("savingsChart").getContext("2d");
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, "rgba(54, 162, 235, 0.4)");
        gradient.addColorStop(1, "rgba(54, 162, 235, 0)");

        const savingsChart = new Chart(ctx, {
          type: "line",
          data: {
            labels: datasets.daily.labels,
            datasets: [
              {
                label: "Savings",
                data: datasets.daily.data,
                backgroundColor: gradient,
                borderColor: "rgba(54, 162, 235, 1)",
                borderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6,
                fill: true,
                tension: 0.4,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: "#1f2b6c",
                titleFont: { size: 13 },
                bodyFont: { size: 12 },
                padding: 10,
              },
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: "#6b7280" },
              },
              y: {
                beginAtZero: true,
                grid: { color: "#f3f4f6" },
                ticks: { color: "#6b7280" },
              },
            },
          },
        });

        document.getElementById("timeframe").addEventListener("change", function () {
          const selected = this.value;
          savingsChart.data.labels = datasets[selected].labels;
          savingsChart.data.datasets[0].data = datasets[selected].data;
          savingsChart.update();
        });
      </script>
</body>
</html>
