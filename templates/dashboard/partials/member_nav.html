        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>

            <line class="cls-1" x1="16" x2="16" y1="7" y2="25"></line>
            <line class="cls-1" x1="22" x2="22" y1="11" y2="25"></line>

        </svg>
        <span class="w-5 mr-3 inline-block"></span>
        Dashboard</a>
    <a href="{% url 'transactions' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
        <span class="w-5 mr-3 inline-block"></span>
        Transactions
    </a>
    <a href="{% url 'loans' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">

<!-- Top Bar -->
<header class="bg-white flex justify-between items-center p-6 shadow fixed top-0 md:left-64 right-0">
  <div class="flex items-center space-x-3">
    <!-- Burger button (mobile) -->
    <button id="burger" class="md:hidden p-2 rounded hover:bg-gray-100">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>
    <h1 class="text-xl font-semibold text-[#1f2b6c]">Appointments</h1>
  </div>

  <div class="flex items-center space-x-4">
    <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
    <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
    <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
    <div class="flex items-center space-x-2 ">
      <div
        class="w-8 h-8 bg-[#3d5af1] rounded-full flex items-center justify-center text-white font-semibold"
      >
        M
      </div>
      <span class="text-sm font-medium">Maribel Yan</span>
      <div class="dropdown dropdown-end">
        <svg tabindex="0" role="button"
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 9l-7 7-7-7"
        />
        </svg>
        <!-- Dropdown Menu -->
        {% include "partials/profile_menu.html" %}
      </div>
    </div>
  </div>
</header>

<!-- Mobile Sidebar -->
<div
    id="mobileSidebar"
    class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"
>
    <div class="absolute left-0 top-0 w-64 bg-white h-full p-6 shadow-lg">
    <div class="flex justify-between items-center mb-6">
        <div class="text-2xl font-bold text-[#1f2b6c]">EWABB</div>
        <button id="closeSidebar" class="p-2 rounded hover:bg-gray-100">
        ✕
        </button>
    </div>
    <nav>
        <a
        href="{% url 'dashboard' %}"
        class="block py-2 text-gray-600 hover:text-[#3d5af1]"
        >Dashboard</a
        >
        <a
        href="{% url 'transactions' %}"
        class="block py-2 text-gray-600 hover:text-[#3d5af1]"
        >Transactions</a
        >
        <a
        href="{% url 'loans' %}"
        class="block py-2 text-gray-600 hover:text-[#3d5af1]"
        >Loans</a
        >
        <a
        href="{% url 'appointments' %}"
        class="block py-2 text-[#3d5af1] font-semibold bg-[#f1f5ff]"
        >Appointments</a
        >
    </nav>
    </div>
</div>

<script>
    // Sidebar toggle
    const burger = document.getElementById("burger");
    const mobileSidebar = document.getElementById("mobileSidebar");
    const closeSidebar = document.getElementById("closeSidebar");

    burger.addEventListener("click", () => {
        mobileSidebar.classList.remove("hidden");
    });
    closeSidebar.addEventListener("click", () => {
        mobileSidebar.classList.add("hidden");
    });
    mobileSidebar.addEventListener("click", (e) => {
        if (e.target === mobileSidebar) {
        mobileSidebar.classList.add("hidden");
        }
    });
</script>
