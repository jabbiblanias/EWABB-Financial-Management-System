<div id="popupApplication" class="hidden fixed inset-0 flex items-center justify-center bg-black/30 z-50">
    <!-- Form Card: Wider, better shadow, and rounded corners -->
    <form id="loanApplicationForm" class="bg-white rounded-2xl shadow-2xl p-6 md:p-10 w-full max-w-4xl max-h-[100vh] overflow-y-auto">

        <!-- Header -->
        <h2 class="text-3xl font-extrabold text-indigo-700 mb-6 border-b border-b-gray-200 pb-2">Loan Application</h2>

        <!-- Main Content Grid -->
        <div class="grid md:grid-cols-2 gap-8">
            <!-- LEFT COLUMN: Input Fields -->
            <div class="space-y-6">
                {% if request.user.groups.all.0.name == "Bookkeeper" %}
                <div class="form-group">
                    <label for="accountNumber" class="block text-sm font-medium text-gray-700 mb-1">Account Number</label>
                    <input
                        name="accountNumber"
                        id="accountNumber"
                        type="text"
                        required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-150"
                        placeholder="Enter account number"
                    />
                </div>
                {% endif %}

                <!-- Loan Type -->
                <div class="form-group">
                    <label for="loanType" class="block text-sm font-medium text-gray-700 mb-1">Loan Type</label>
                    <select required 
                    id="loanType"
                    name="loanType"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-150 appearance-none bg-white">
                      <option value="" selected hidden>-- Choose Loan Type --</option>
                      <option>Personal Loan</option>
                      <option>Business Loan</option>
                      <option>Emergency Loan</option>
                    </select>
                </div>

                <!-- Amount -->
                <div class="form-group">
                    <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Loan Amount (₱)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 font-medium">₱</span>
                        <input
                            name="loanAmount"
                            id="amount"
                            type="text"
                            oninput="this.value=this.value.replace(/[^0-9.]/g,'')"
                            onkeyup="updateLoanDetails()"
                            required
                            class="w-full border border-gray-300 rounded-lg pl-8 pr-4 py-2.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-150 text-right"
                            placeholder="0.00"
                        />
                    </div>
                </div>

                <!-- Term Slider -->
                <div class="form-group pt-4">
                    <label for="loan-term" class="block text-sm font-medium text-gray-700 mb-4">
                        Term in Months
                    </label>
                    <div class="slider-container relative mb-4">
                        <input type="range" 
                        id="loan-term"
                        class="w-full accent-indigo-600 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                        min="0"
                        max="21"
                        step="1"
                        value="0"
                        oninput="updateValue(this.value)"
                        required/>
                        
                        <!-- Value Display integrated below the slider -->
                        <div class="flex justify-between text-xs text-gray-500 mt-2">
                            <span>100 Days</span>
                            <span>2 Years</span>
                        </div>
                    </div>
                    <!-- Central Display for current term -->
                    <div class="flex justify-center -mt-2">
                        <input type="text" id="term-value" name="loanTerm" 
                            class="text-indigo-700 font-bold text-lg text-center bg-indigo-50 border border-indigo-300 py-1 rounded-full shadow-inner w-fit outline-none" 
                            value="0 Months" readonly/>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Financial Details/Calculations -->
            <div class="space-y-4 p-6 bg-indigo-50/70 rounded-xl border border-indigo-200 shadow-inner h-fit">
                <h3 class="text-xl font-bold text-indigo-700 border-b border-indigo-300 pb-2 mb-4">Financial Breakdown</h3>
                
                <!-- Detail Items -->
                
                <div class="flex justify-between items-center py-2 border-b border-indigo-100">
                    <span class="text-gray-700 font-medium">Amortization</span>
                    <div class="flex items-center text-lg">
                        <input type="text" name="amortization" id="amortization"
                            class="text-gray-900 font-extrabold text-right tabular-nums bg-transparent outline-none w-36 pr-1"
                            value="0.00" readonly />
                        <span id="displayValue" class="text-indigo-600 font-bold"> / Daily</span>
                    </div>
                </div>

                <div class="flex justify-between items-center py-2 border-b border-indigo-100">
                    <span class="text-gray-700 font-medium">Total Payable</span>
                    <input type="text" name="totalPayable" id="totalPayable" 
                        class="text-gray-900 font-extrabold text-right tabular-nums bg-transparent outline-none w-36" 
                        value="0.00" readonly/>
                </div>

                <div class="flex justify-between items-center py-2 border-b border-indigo-100">
                    <span class="text-gray-700 text-sm">Service Charge (-)</span>
                    <input type="text" name="serviceCharge" id="serviceCharge" 
                        class="text-red-600 font-medium text-right tabular-nums bg-transparent outline-none w-36" 
                        value="0.00" readonly/>
                </div>

                <div class="flex justify-between items-center py-2 border-b border-indigo-100">
                    <span class="text-gray-700 text-sm">CBU Deduction (-)</span>
                    <input type="text" name="cbu" id="cbu" 
                        class="text-red-600 font-medium text-right tabular-nums bg-transparent outline-none w-36" 
                        value="0.00" readonly/>
                </div>

                <div class="flex justify-between items-center py-2 border-b border-indigo-100">
                    <span class="text-gray-700 text-sm">Insurance Fee (-)</span>
                    <input type="text" name="insurance" id="insurance" 
                        class="text-red-600 font-medium text-right tabular-nums bg-transparent outline-none w-36" 
                        value="0.00" readonly/>
                </div>

                <!-- Release Amount (Highlighted) -->
                <div class="flex justify-between items-center pt-4 border-t border-indigo-300">
                    <span class="text-indigo-800 font-bold text-lg">Net Release Amount</span>
                    <input type="text" name="releaseAmount" id="releaseAmount" 
                        class="text-indigo-900 font-extrabold text-2xl text-right tabular-nums bg-transparent outline-none w-44" 
                        value="0.00" readonly/>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-end gap-4 mt-10 pt-4 border-t border-t-gray-200">
            <button id="cancel" onclick="closePopUp(event)" 
                class="text-gray-700 font-semibold border border-gray-300 px-8 py-3 rounded-xl hover:bg-gray-100 transition duration-200 shadow-sm">
                Cancel
            </button>
            <button type="submit" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-xl transition duration-200 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Submit Application
            </button>
        </div>
    </form>
</div>
<!-- Toast -->
<div
  id="toast-container"
  class="pointer-events-none fixed inset-x-0 top-4 z-[60] mx-auto w-fit rounded-xl hidden px-4 py-2 text-white shadow-lg"
  role="status"></div>
<script>
  document.getElementById("loanApplicationForm").addEventListener("submit", async function(e) {
    this.disable = true;
    e.preventDefault()
    try {
      const form = e.target;
      const formData = new FormData(form);
      const response = await fetch("{% url 'apply_loan' %}", {
        method: "POST",
        headers: {
          "X-CSRFToken": "{{ csrf_token }}"
        },
        body: formData
      });

      const data = await response.json();

      if (data.success) {
        showAlert(data.message, "success");
        closePopUp();
        document.getElementById('table-body').innerHTML = data.loans;
      }else {
        showAlert(data.message, "error");
      }
    } catch (Error) {
      console.error("Error", Error);
    }
    this.disable = false;
  })
</script>
<script>
  function openPopUp() {
    document.getElementById('popupApplication').classList.remove('hidden');
  }
  function closePopUp() {
    document.getElementById('popupApplication').classList.add('hidden');
    document.getElementById('accountNumber').value = ''
    document.getElementById('loanType').value = '';
    document.getElementById('totalPayable').textContent = '0';
    document.getElementById('amount').value = '';
    document.getElementById('serviceCharge').textContent = '0';
    document.getElementById('amortization').textContent = '0';
    document.getElementById('cbu').textContent = '0';
    document.getElementById('insurance').textContent = '0';
    document.getElementById('releaseAmount').textContent = '0';
    document.getElementById('loan-term').value = 0;
    updateValue(0);
  }
  
  // 1. Define the custom loan terms in an array.
  const loanTerms = [
    '100 days',
    '4 months', '5 months',
    '6 months', '7 months', '8 months', '9 months', '10 months', '11 months',
    '1 year',
    '1 year and 1 month', '1 year and 2 months', '1 year and 3 months',
    '1 year and 4 months', '1 year and 5 months', '1 year and 6 months',
    '1 year and 7 months', '1 year and 8 months', '1 year and 9 months',
    '1 year and 10 months', '1 year and 11 months',
    '2 years'
  ];

  const termSlider = document.getElementById('loan-term');
  const termValueDisplay = document.getElementById('term-value');

  // 2. The function now uses the slider's value as an index for the array.
  function updateValue(index) {
    termValueDisplay.value = loanTerms[index];
    updateLoanDetails();
  }

  // 3. Call the function on page load to set the initial value.
  window.onload = function() {
    updateValue(termSlider.value);
  };

  function updateLoanDetails() {
    const value = parseFloat(document.getElementById('amount').value) || 0;

    const totalPayable = document.getElementById('totalPayable');
    const serviceCharge = document.getElementById('serviceCharge');
    const releasedAmount = document.getElementById('releaseAmount');
    const amortization = document.getElementById('amortization');
    const cbu = document.getElementById('cbu');
    const insurance = document.getElementById('insurance');
    const term = document.getElementById('term-value').value;
    const amortizationDisplay = document.getElementById('displayValue');

    let computed_service_charge, computed_cbu, computed_insurance, totalAmount, months, totalLoan;

    if (term == "100 days") {
      totalLoan  = value;
      computed_service_charge = (totalLoan * 0.07).toFixed(2);
      computed_cbu = (totalLoan * 0.1).toFixed(2);
      computed_insurance = (totalLoan * 0.01).toFixed(2);
      totalAmount = totalLoan - computed_service_charge - computed_cbu - computed_insurance;

      totalPayable.value = totalLoan.toFixed(2);
      serviceCharge.value =  computed_service_charge;
      cbu.value = computed_cbu;
      insurance.value = computed_insurance;
      amortization.value = value * 0.01;
      amortizationDisplay.textContent = " / Daily";
      releasedAmount.value = totalAmount.toFixed(2);
    } else {
      months = termConvertion(term);
      totalLoan = value * ((0.02 * months) + 1);
      computed_amortization = parseInt(totalLoan / months);
      computed_service_charge = ((totalLoan - value) / 2).toFixed(2);
      computed_cbu = ((totalLoan - value) / 2).toFixed(2);
      computed_insurance = (totalLoan * 0.01).toFixed(2);
      totalAmount = totalLoan - computed_service_charge - computed_cbu - computed_insurance;

      totalPayable.value = totalLoan.toFixed(2);
      serviceCharge.value =  computed_service_charge; // Assuming 2% service charge
      cbu.value = computed_cbu; // Replace with actual CBU value logic
      insurance.value = computed_insurance; // Assuming 0.5% insurance
      amortization.value = computed_amortization; // Assuming 10 months for simplicity
      amortizationDisplay.textContent = " / Monthly";
      releasedAmount.value = totalAmount.toFixed(2);
    }
  }

  function termConvertion(term) {
    let months = 0;

    // Extract years
    const yearMatch = term.match(/(\d+)\s*year/);
    if (yearMatch) {
      months += parseInt(yearMatch[1], 10) * 12;
    }

    // Extract months
    const monthMatch = term.match(/(\d+)\s*month/);
    if (monthMatch) {
      months += parseInt(monthMatch[1], 10);
    }

    return months;
  }

  // Toast notification function
  function showAlert(message, type) {
    const toast = document.getElementById("toast-container");

    // Remove old color classes before adding new one
    toast.classList.remove("bg-emerald-600", "bg-red-600", "bg-yellow-600");

    // Style by type
    if (type === "approve" || type === "success") {
      toast.classList.add("bg-emerald-600"); // green
    } else if (type === "reject") {
      toast.classList.add("bg-red-600"); // red
    } else {
      toast.classList.add("bg-yellow-600"); // yellow default
    }

    // Set message
    toast.textContent = message;

    // Show toast
    toast.classList.remove("hidden");

    // Hide after 4s
    setTimeout(() => toast.classList.add("hidden"), 4000);
  }
</script>
