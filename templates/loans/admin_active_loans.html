<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    {% include 'dashboard/partials/admin_nav.html' %}

    <!-- Main Content -->
    <div class="ml-64 mr-4 mt-[72px] flex-1">
      <!-- Financial Report Section -->
      <!-- Tabs -->
      <div class="px-6 pt-4">
        <div class="flex border-b border-gray-200">
          <a href="{% url 'loan_applications' %}" class="px-4 py-2 text-gray-500 hover:text-blue-600">Loan
            Applications</a>
          <a href="{% url 'active_loans' %}"
            class="px-4 py-2 text-blue-600 font-medium border-b-2 border-blue-600">Active loans</a>
        </div>
      </div>

      <!-- Table -->
      <div class="px-6 py-4">
        <div class="border border-gray-200 rounded-md overflow-hidden">
          <table id="myTable" class="min-w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Loan ID</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Account Number</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Remaining Balance</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Amount Due</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Due Date</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Status</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Action</th>
              </tr>
            </thead>
            <tbody id="loan_applications-table-body" class="bg-white">
              {% include 'loans/partials/active_loans_table_body.html' %}
            </tbody>
          </table>
        </div>
      </div>
      <!-- Pagination -->
      <div class="px-6 py-4 text-sm text-gray-500 flex justify-end items-center space-x-4">
        <button class="text-blue-500">&lt; Previous</button>
        <button class="w-6 h-6 bg-blue-600 text-white rounded text-xs">1</button>
        <button class="text-blue-500">2</button>
        <button class="text-blue-500">3</button>
        <button class="text-blue-500">4</button>
        <button class="text-blue-500">Next &gt;</button>
      </div>
    </div>
  </div>

    <!-- Confirmation Modal -->
    {% include 'loans/partials/confirmation.html' %}
    <script>
      function fillTableRows(tableId, requiredRows) {
        const table = document.getElementById(tableId);
        const tbody = table.querySelector('tbody');
        const currentRows = tbody.querySelectorAll('tr').length;
        const columnsCount = table.querySelectorAll('th').length;

        // Add empty rows if needed
        for (let i = currentRows; i < requiredRows; i++) {
          const row = document.createElement('tr');
          row.className = "border-b border-gray-200"

          for (let j = 0; j < columnsCount; j++) {
            const cell = document.createElement('td');
            cell.className = "px-6 py-3"
            cell.innerHTML = '&nbsp;'; // or leave empty: cell.textContent = '';
            row.appendChild(cell);
          }

          tbody.appendChild(row);
        }
      }

      // Fill table to have exactly 10 rows
      fillTableRows('myTable', 10);
    </script>
</body>

</html>
