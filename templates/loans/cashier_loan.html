<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
  <body class="bg-gray-100 font-sans">

  <div class="flex h-screen">

    <!-- Sidebar -->
     {% include 'dashboard/partials/cashier_nav.html' %}

    <!-- Main content -->
   <div class="flex-1 flex flex-col">
      
      <!-- Header -->
        <header class="flex justify-between items-center px-6 py-4 border-b bg-white">
        <h1 class="text-lg font-semibold">Loans</h1>
        <div class="flex items-center space-x-4">
          <button class="relative">
            <span class="material-icons text-gray-500">🔔</span>
            <span class="absolute top-0 right-0 h-2 w-2 bg-blue-500 rounded-full"></span>
          </button>
          <div class="flex items-center bg-blue-600 text-white rounded-full w-8 h-8 justify-center">C</div>
          <span class="text-gray-700">Cashier</span>
        </div>
      </header>

      <!-- Tabs -->
      <div class="px-6 pt-6">
        <div class="flex space-x-8 border-b border-gray-200">
          <button class="pb-2 text-blue-600 border-b-2 border-blue-600 font-medium">Approved Loans</button>
          <button class="pb-2 text-gray-500 hover:text-gray-700">Released Loans</button>
        </div>
      </div>

      <!-- Loan Table -->
      <div class="px-6 py-4 flex-1">
        <div class="bg-white shadow rounded-xl overflow-hidden">
          <table id="myTable" class="w-full text-left">
            <thead class="text-gray-500 text-sm border-b">
              <tr>
                <th class="px-6 py-3">ID</th>
                <th class="px-6 py-3">Account No</th>
                <th class="px-6 py-3">Loan Amount</th>
                <th class="px-6 py-3">Term</th>
                <th class="px-6 py-3">Installment</th>
                <th class="px-6 py-3"></th>
              </tr>
            </thead>
            <tbody id="loan_applications-table-body" class="bg-white">
              {% include 'loans/partials/loan_applications_table_body.html' %}
            </tbody>
          </table>
        </div>
        </div>
         <!-- Pagination -->
        <div class="px-6 py-4 text-sm text-gray-500 flex justify-end items-center space-x-4">
          <button class="text-blue-500">&lt; Previous</button>
          <button class="w-6 h-6 bg-blue-600 text-white rounded text-xs">1</button>
          <button class="text-blue-500">2</button>
          <button class="text-blue-500">3</button>
          <button class="text-blue-500">4</button>
          <button class="text-blue-500">Next &gt;</button>
        </div>
      </div>
    </div>
  </div>
<script>
  function fillTableRows(tableId, requiredRows) {
        const table = document.getElementById(tableId);
        const tbody = table.querySelector('tbody');
        const currentRows = tbody.querySelectorAll('tr').length;
        const columnsCount = table.querySelectorAll('th').length;
        
        // Add empty rows if needed
        for (let i = currentRows; i < requiredRows; i++) {
            const row = document.createElement('tr');
            row.className = "border-b border-gray-200 hover:bg-sky-100"
            
            for (let j = 0; j < columnsCount; j++) {
            const cell = document.createElement('td');
            cell.className = "px-6 py-3"
            cell.innerHTML = '&nbsp;'; // or leave empty: cell.textContent = '';
            row.appendChild(cell);
            }
            
            tbody.appendChild(row);
        }
    }

    // Fill table to have exactly 10 rows
    fillTableRows('myTable', 10);
</script>
</body>
</html>
