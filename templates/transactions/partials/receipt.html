<div id="receiptModal" class="hidden fixed inset-0 z-50 bg-black/10 flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-lg max-w-sm w-full">
    <div class="space-y-4">
      <div class="flex justify-between items-center">
        <span class="text-gray-600">Transaction ID</span>
        <span id="transaction_id" class="font-semibold">00124356678</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-600">Account No.</span>
        <span id="accountNo" class="font-semibold">12345678910</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-600">Member Name</span>
        <span id="memberName" class="font-semibold">Mark Anthony Dela Cruz</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-600">Transaction Type</span>
        <span id="transaction_type" class="font-semibold">Savings</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-600">Date and Time</span>
        <span id="dateTime" class="font-semibold">March 12, 2025 10:30 am</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-600">Amount</span>
        <span id="amount" class="font-semibold">10,000</span>
      </div>
    </div>

    <div class="mt-8 flex justify-between items-center">
      <button onclick="document.getElementById('receiptModal').classList.add('hidden')" 
              class="text-blue-600 font-semibold py-2 px-6 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        Close
      </button>

      <!-- ✅ Now this button calls the function -->
      <button onclick="openPrintPage()" 
              class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        Print
      </button>
    </div>
  </div>
</div>

<script>
function openPrintPage() {
  // Get the values from the modal
  const transaction_id = document.getElementById("transaction_id").textContent;
  const accountNo = document.getElementById("accountNo").textContent;
  const memberName = document.getElementById("memberName").textContent;
  const transaction_type = document.getElementById("transaction_type").textContent;
  const dateTime = document.getElementById("dateTime").textContent;
  const amount = document.getElementById("amount").textContent;

  // Create a query string to send data to passbook.html
  const params = new URLSearchParams({
    transaction_id,
    accountNo,
    memberName,
    transaction_type,
    dateTime,
    amount
  });

  // ✅ Opens print layout in new tab
  window.open(`passbook.html?${params.toString()}`, "_blank");
}
</script>
