<!-- Receipt Modal -->
  <div id="receiptModal" class="hidden fixed inset-0 z-50 bg-black/10 flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-sm w-full">
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Transaction ID</span>
          <span id="transaction_id" class="font-semibold"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Account No.</span>
          <span id="accountNo" class="font-semibold"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Member Name</span>
          <span id="name" class="font-semibold"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Transaction Type</span>
          <span id="transaction_type" class="font-semibold"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Date and Time</span>
          <span id="dateTime" class="font-semibold"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Cash</span>
          <span id="amount_received" class="font-semibold"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Amount Due</span>
          <span id="amountDue" class="font-semibold"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Change</span>
          <span id="change" class="font-semibold"></span>
        </div>
      </div>

      <div class="mt-8 flex justify-between items-center">
        <button onclick="document.getElementById('receiptModal').classList.add('hidden')" 
                class="text-blue-600 font-semibold py-2 px-6 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          Close
        </button>

        <!-- Print button -->
        <button onclick="openPrintPage()" 
                class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
          Print
        </button>
      </div>
    </div>
  </div>
  <script>
  function openPrintPage() {
    // Get values from modal
    const transaction_id = document.getElementById("transaction_id").textContent.trim();
    const accountNo = document.getElementById("accountNo").textContent.trim();
    const memberName = document.getElementById("memberName").textContent.trim();
    const transaction_type = document.getElementById("transaction_type").textContent.trim();
    const dateTime = document.getElementById("dateTime").textContent.trim();
    const amount = document.getElementById("amount").textContent.trim();

    // Build query string
    const params = new URLSearchParams({
      transaction_id,
      accountNo,
      memberName,
      transaction_type,
      dateTime,
      amount
    });

    // ✅ Open print layout in new tab with all parameters
    window.open(`{% url 'print_passbook' %}?${params.toString()}`, "_blank");
  }
  </script>
