<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passbook Print</title>
  <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
  
  <style>
    body {
      font-family: "Courier New", monospace;
      font-size: 14px;
      color: #000;
      margin: 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid #000;
    }

    th, td {
      border: 1px solid #000;
      padding: 4px 6px;
      text-align: center;
    }

    th {
      font-weight: bold;
      background-color: #fdfdfd;
    }

    td {
      height: 22px;
    }

    th:nth-child(1), td:nth-child(1) {
      width: 13%;
      text-align: left;
    }

    th:nth-child(2), td:nth-child(2) {
      width: 30%;
      text-align: left;
    }

    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6) {
      width: 14%;
    }

    @media print {
      @page {
        margin: 10mm;
      }
      body {
        margin: 10mm;
      }
      button {
        display: none !important;
      }
    }

    /* Optional fixed font style (Tailwind can’t directly set Courier font globally) */
    body {
      font-family: "Courier New", monospace;
    }
  </style>
</head>
<body class="text-[14px] text-black m-10 print:m-[10mm]">

  <!-- Header -->
  <div class="flex justify-between font-bold uppercase mb-2 text-[15px]">
    <span id="depositorName">DEPOSITORS</span>
    <span>
      ACCOUNT NUMBER <br>
      <span id="accountNumber" class="ml-4"></span>
    </span>
  </div>

  <!-- Passbook Table -->
  <table class="w-full border border-black border-collapse">
    <thead>
      <tr class="bg-gray-50">
        <th class="border border-black text-left w-[13%] px-2 py-1">DATE</th>
        <th class="border border-black text-left w-[30%] px-2 py-1">DESCRIPTION</th>
        <th class="border border-black w-[14%] px-2 py-1" colspan="2">LOAN</th>
        <th class="border border-black w-[14%] px-2 py-1" colspan="2">CBU</th>
      </tr>
      <tr class="bg-gray-50">
        <th class="border border-black"></th>
        <th class="border border-black"></th>
        <th class="border border-black px-2 py-1">PAYMENT</th>
        <th class="border border-black px-2 py-1">BALANCE</th>
        <th class="border border-black px-2 py-1">PAYMENT</th>
        <th class="border border-black px-2 py-1">BALANCE</th>
      </tr>
    </thead>
    <tbody id="passbookEntries">
      <!-- Dynamic first entry -->
      <tr class="h-[22px]">
        <td id="entryDate" class="border border-black px-2 py-1 text-left"></td>
        <td id="entryDescription" class="border border-black px-2 py-1 text-left"></td>
        <td class="border border-black px-2 py-1"></td>
        <td class="border border-black px-2 py-1"></td>
        <td id="entryPayment" class="border border-black px-2 py-1"></td>
        <td class="border border-black px-2 py-1"></td>
      </tr>

      <!-- Extra blank rows -->
      {% for i in 1|to:7 %}
      <tr class="h-[22px]">
        <td class="border border-black px-2 py-1"></td>
        <td class="border border-black px-2 py-1"></td>
        <td class="border border-black px-2 py-1"></td>
        <td class="border border-black px-2 py-1"></td>
        <td class="border border-black px-2 py-1"></td>
        <td class="border border-black px-2 py-1"></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <script>
    // Parse query parameters from URL
    const urlParams = new URLSearchParams(window.location.search);

    const transactionId = urlParams.get('transaction_id');
    const accountNo = urlParams.get('accountNo');
    const memberName = urlParams.get('memberName');
    const transactionType = urlParams.get('transaction_type');
    const dateTime = urlParams.get('dateTime');
    const amount = urlParams.get('amount');

    // Display values
    document.getElementById("depositorName").textContent = memberName || "DEPOSITORS";
    document.getElementById("accountNumber").textContent = accountNo || "";
    document.getElementById("entryDate").textContent = dateTime || "";
    document.getElementById("entryDescription").textContent = transactionType || "";
    document.getElementById("entryPayment").textContent = amount || "";

    // Auto print
    window.onload = () => window.print();
  </script>
</body>
</html>
