<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passbook Print</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
  body {
    font-family: "Courier New", monospace;
    font-size: 12px;
    width: 8in;
    height: 5in;
    margin: 0 auto;
    padding: 0.3in;
    box-sizing: border-box;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  td {
    padding: 3px 5px;
    text-align: left;
    height: 20px;
  }

  @media print {
    @page {
      size: 8in 5in landscape;
      margin: 5mm;
    }

    body {
      width: 8in;
      height: 5in;
      margin: 0;
      padding: 0.2in;
      overflow: hidden;
    }

    button {
      display: none !important;
    }

    table {
      font-size: 11px;
    }
  }
</style>

</head>
<body class="text-[12px] text-black m-0 print:m-0">

  <table class="w-full border-collapse">
    <tbody id="passbookEntries">
      <tr class="h-[22px]">
        <td id="entryDate" class="px-2 py-1 text-left"></td>
        <td id="entryDescription" class="px-2 py-1 text-left"></td>
        <td class="px-2 py-1"></td>
        <td class="px-2 py-1"></td>
        <td id="entryPayment" class="px-2 py-1"></td>
        <td class="px-2 py-1"></td>
      </tr>
    </tbody>
  </table>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById("entryDate").textContent = urlParams.get('dateTime') || "";
    document.getElementById("entryDescription").textContent = urlParams.get('transaction_type') || "";
    document.getElementById("entryPayment").textContent = urlParams.get('amount') || "";
    window.onload = () => window.print();
  </script>
</body>
</html>
