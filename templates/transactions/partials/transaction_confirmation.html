<!-- Transaction Confirmation Modal -->
<div
  id="transactionModal"
  class="fixed inset-0 z-50 hidden bg-black/30"
  aria-labelledby="transaction-title"
  role="dialog"
  aria-modal="true"
>
  <div
    class="relative mx-auto mt-28 w-[92%] max-w-md rounded-2xl bg-white shadow-xl ring-1 ring-black/5"
  >
    <!-- Header -->
    <div class="flex items-start gap-3 p-5">
      <div
        class="mt-1 flex h-10 w-10 items-center justify-center rounded-full bg-yellow-100"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-600" fill="none"
          viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div class="flex-1">
        <h3 id="transaction-title" class="text-lg font-semibold text-gray-900">
          Confirm Transaction?
        </h3>
        <p id="transaction-desc" class="mt-1 text-sm text-gray-600">
          You are about to perform a <span class="font-medium" id="confirmType"></span>
          of <span class="font-medium" id="confirmAmount"></span> 
          for account <span class="font-medium" id="confirmAccount"></span>.
        </p>
      </div>
      <button
        onclick="closeTransactionModal()"
        class="ml-2 rounded-lg p-1 text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-yellow-500"
        aria-label="Close"
      >
        ✕
      </button>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 border-t border-gray-100 p-5">
      <button
        onclick="closeTransactionModal()"
        type="button"
        class="rounded-xl border border-gray-300 bg-white px-4 py-2 text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        Cancel
      </button>
      <button
        id="confirmTransaction"
        type="button"
        class="inline-flex items-center gap-2 rounded-xl bg-blue-600 px-4 py-2 font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        Confirm
      </button>
    </div>
  </div>
</div>
<script>
  // Listen for Enter key while modal is open
  document.addEventListener("keydown", function(e) {
    const modal = document.getElementById("transactionModal");

    // Only trigger if modal is visible
    if (!modal.classList.contains("hidden") && e.key === "Enter") {
      e.preventDefault(); // prevent accidental form submit
      document.getElementById("confirmTransaction").click();
    }
  });
  function closeTransactionModal() {
    transactionModal.classList.add("hidden");
  }
  function openTransactionModal() {
    transactionModal.classList.remove("hidden");
  }
</script>
