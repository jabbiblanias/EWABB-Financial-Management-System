{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions</title>
  {% tailwind_css %}
  <script src="{% static 'partials/table-utils.js' %}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      fillTableRows('myTable', 10);
    });
  </script>
</head>

<body class="bg-gray-100 font-sans">
  <!-- Sidebar -->
  {% include 'dashboard/partials/admin_nav.html' %}
  <div class="flex h-screen">

    <!-- Main Content -->
    <main class="ml-64 mr-4 mt-[72px] flex-1">
      <div class="px-6 pt-4">
        <div class="flex border-b border-gray-300 mb-4">
          <button class="px-4 py-2 text-sm font-medium text-blue-600 border-b-2 border-blue-600">All Transactions</button>
          <!--<button class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Program Transactions</button>-->
        </div>
      </div><!-- Tabs -->
      <div class="mb-4 flex flex-col md:flex-row gap-4 items-end justify-end px-2 md:px-6">
      <div class="min-w-0">
        <label for="start_date" class="block text-sm font-medium text-gray-700">Start Date</label>
        <input type="date" id="start_date" name="start_date" value="{{ start_date|default:'' }}"
          class="w-full border border-gray-300 rounded-md px-4 py-1 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      </div>

      <div class="min-w-0">
        <label for="end_date" class="block text-sm font-medium text-gray-700">End Date</label>
        <input type="date" id="end_date" name="end_date" value="{{ end_date|default:'' }}"
          class="w-full border border-gray-300 rounded-md px-4 py-1 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      </div>

      <button id="filter-button"
        class="w-full md:w-auto px-4 py-2 bg-indigo-600 text-white font-semibold rounded-md shadow hover:bg-indigo-700 transition duration-150">
        Filter
      </button>
      <button id="clear-filter-button"
        class="w-full md:w-auto px-4 py-2 bg-gray-300 text-gray-800 font-semibold rounded-md shadow hover:bg-gray-400 transition duration-150">
        Clear
      </button>
    </div>


      <!-- Transactions Table -->
      <div class="p-6">
        <div class="bg-white rounded-xl shadow overflow-hidden">
          <table id="myTable" class="min-w-full text-left text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left font-medium">Transaction ID</th>
                <th class="px-6 py-3 text-left font-medium">Type</th>
                <th class="px-6 py-3 text-left font-medium">Account No</th>
                <th class="px-6 py-3 text-left font-medium">Date</th>
                <th class="px-6 py-3 text-left font-medium">Amount</th>
                <th class="px-6 py-3 text-left font-medium">Description</th>
              </tr>
            </thead>
            <tbody id="table-body" class="bg-white">
              {% include 'transactions/partials/cashier_transaction_table_body.html' %}
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
          <div id="pagination-controls" class="mt-4 flex justify-end">
            {% include 'partials/pagination.html' %}
          </div>
      </div>
    </main>
  </div>
</body>

</html>
