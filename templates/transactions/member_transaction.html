{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWABB Transactions</title>
  {% tailwind_css %}
  <script src="{% static 'partials/table-utils.js' %}"></script>
</head>

<body class="bg-gray-100 font-sans">
  {% include 'dashboard/partials/member_nav.html' %}

  <main class="flex-1 mt-[72px] md:ml-64 p-4 md:p-6 overflow-y-auto">
    <div class="px-2 md:px-6 py-4 text-lg font-semibold text-gray-700">
      All Transactions
    </div>

    <div class="mb-4 flex flex-col md:flex-row gap-4 items-end justify-end px-2 md:px-6">
      <div class="min-w-0">
        <label for="start_date" class="block text-sm font-medium text-gray-700">Start Date</label>
        <input type="date" id="start_date" name="start_date" value="{{ start_date|default:'' }}"
          class="w-full border border-gray-300 rounded-md px-4 py-1 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      </div>

      <div class="min-w-0">
        <label for="end_date" class="block text-sm font-medium text-gray-700">End Date</label>
        <input type="date" id="end_date" name="end_date" value="{{ end_date|default:'' }}"
          class="w-full border border-gray-300 rounded-md px-4 py-1 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      </div>

      <button id="filter-button"
        class="w-full md:w-auto px-4 py-2 bg-indigo-600 text-white font-semibold rounded-md shadow hover:bg-indigo-700 transition duration-150">
        Filter
      </button>
      <button id="clear-filter-button"
        class="w-full md:w-auto px-4 py-2 bg-gray-300 text-gray-800 font-semibold rounded-md shadow hover:bg-gray-400 transition duration-150">
        Clear
      </button>
    </div>
    <div class="bg-white shadow rounded-xl overflow-x-auto">
      <table id="myTable" class="min-w-full text-left text-sm">
        <thead class="bg-gray-50">
          <tr class="text-sm text-gray-700">
            <th class="px-4 md:px-6 py-3 font-medium whitespace-nowrap">Transaction ID</th>
            <th class="px-4 md:px-6 py-3 font-medium whitespace-nowrap">Transaction Type</th>
            <th class="px-4 md:px-6 py-3 font-medium whitespace-nowrap">Date</th>
            <th class="px-4 md:px-6 py-3 font-medium whitespace-nowrap">Amount</th>
          </tr>
        </thead>
        <tbody id="table-body" class="bg-white">
          {% include 'transactions/partials/member_transaction_table_body.html' %}
        </tbody>
      </table>
    </div>

    <div id="pagination-controls" class="mt-4 flex justify-end">
      {% include 'partials/pagination.html' %}
    </div>
  </main>
  </div>

  <script>
    // Close mobile sidebar when clicking outside
    document.addEventListener("click", function (event) {
      const sidebar = document.getElementById("mobileSidebar");
      const toggle = document.getElementById("menuToggle");
      if (!sidebar.contains(event.target) && !toggle.contains(event.target)) {
        sidebar.classList.add("hidden");
      }
    });
  </script>
</body>

</html>
