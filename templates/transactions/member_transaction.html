{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Transactions</title>
    {% tailwind_css %}
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
      <!-- Sidebar -->
      <aside class="w-64 bg-white shadow fixed top-0 left-0 h-screen">
      <div class="p-6 text-2xl font-bold text-[#1f2b6c]">EWABB</div>
        <nav class="mt-6">
          <a href="{% url 'dashboard' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
              <span class="w-5 mr-3 inline-block"></span> 
              Dashboard</a>
          <a href="{% url 'transactions' %}" class="flex items-center px-6 py-3 text-[#3d5af1] font-semibold bg-[#f1f5ff]">
          <span class="w-5 mr-3 inline-block"></span>
          Transactions </a>
          <a href="{% url 'loans' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
            <span class="w-5 mr-3 inline-block"></span>
            Loans</a>
          <a href="{% url 'appointments' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
            <span class="w-5 mr-3 inline-block"></span>
            Appointments</a>
          </nav>
      </aside>

    <!-- Main Content -->
      <main class="ml-64 mt-[72px] flex-1">
        <!-- Top Bar -->
        <div class="flex justify-between items-center p-6 shadow fixed top-0 left-64 right-0">
          <h1 class="text-xl font-semibold text-[#1f2b6c]">Transactions</h1>
          <div class="flex items-center space-x-4">
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <div class="flex items-center space-x-2">
              <div class="w-8 h-8 bg-[#3d5af1] rounded-full flex items-center justify-center text-white font-semibold">M</div>
              <span class="text-sm font-medium">Maribel Yan</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Transaction Table -->
        <div class="p-6 mt-6">
          <div class="bg-white shadow rounded-xl overflow-hidden">
            <div class="px-6 py-4 text-lg font-semibold text-gray-700">All Transactions</div>
            <table class="min-w-full text-left">
              <thead>
                <tr class="text-sm text-blue-500">
                  <th class="px-6 py-4">Transaction ID</th>
                  <th class="px-6 py-4">Transaction Type</th>
                  <th class="px-6 py-4">Date</th>
                  <th class="px-6 py-4">Amount</th>
                </tr>
              </thead>
               <tbody>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                </tbody>
            </table>
          </div>
          <div class="px-6 py-4 text-sm text-gray-500 flex justify-end items-center space-x-4">
              <button class="text-blue-500">&lt; Previous</button>
              <button class="w-6 h-6 bg-blue-600 text-white rounded text-xs">1</button>
              <button class="text-blue-500">2</button>
              <button class="text-blue-500">3</button>
              <button class="text-blue-500">4</button>
              <button class="text-blue-500">Next &gt;</button>
            </div>
        </div>
      </main>
    </div>
  </body>
</html>
