<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>financialReportPdf</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-6xl mx-auto bg-white p-6 shadow rounded">
    
    <!-- Centered Title -->
    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold uppercase">
        Empowered Women's Association of Barangay Bañadero (EWABB)

      <p class="text-sm font-semibold mt-1 uppercase">
        Updated Report as of September 13, 2024
      </p>
    </div>

    <!-- Table -->
    <div id="tableArea" class="overflow-x-auto">
      <table class="min-w-full border border-black text-sm">
        <thead>
          <tr class="bg-blue-200 text-center">
            <th class="border border-black px-2 py-1">Account No</th>
            <th class="border border-black px-2 py-1">Name</th>
            <th class="border border-black px-2 py-1">Amount of Loan Balance</th>
            <th class="border border-black px-2 py-1">Date Loaned</th>
            <th class="border border-black px-2 py-1">Savings</th>
            <th class="border border-black px-2 py-1">2% Penalty Charges</th>
            <th class="border border-black px-2 py-1">Savings After Deduction</th>
            <th class="border border-black px-2 py-1">Remarks</th>
          </tr>
        </thead>
        <tbody>
          <!-- Example row -->
          <tr>
            <td class="border border-black px-4 py-3"></td>
            <td class="border border-black px-4 py-3"></td>
            <td class="border border-black px-4 py-3"></td>
            <td class="border border-black px-4 py-3"></td>
            <td class="border border-black px-4 py-3"></td>
            <td class="border border-black px-4 py-3"></td>
            <td class="border border-black px-4 py-3"></td>
            <td class="border border-black px-4 py-3"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
