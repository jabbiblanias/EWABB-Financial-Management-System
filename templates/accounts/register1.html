{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Registration</title>
    {% tailwind_css %}
  </head>
  <body class="font-sans">
    <!-- Navbar -->
    <nav class="bg-[#003366] px-6 py-4 flex justify-between items-center">
      <h1 class="text-white font-bold text-xl">EWABB</h1>
      <div class="space-x-4">
        <button class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded">Login</button>
      </div>
    </nav>

    <!-- Progress Bar -->
    <div class="w-full py-4">
      <div class="flex justify-center space-x-10">
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold">1</div>
          <span class="font-medium text-yellow-400">Member Personal Information</span>
        </div>
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 flex items-center justify-center font-bold">2</div>
          <span class="font-medium">Family Background</span>
        </div>
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 flex items-center justify-center font-bold">3</div>
          <span class="font-medium">Create Account</span>
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <form class="max-w-3xl mx-auto px-10 py-10" method="POST" action="{% url 'register1' %}">
      {% csrf_token %}
      <div class="text-center">
        <h2 class="text-3xl font-bold mb-2">Personal Information</h2>
        <p class="mb-6">• Please fill out the form with accurate information</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
        <!-- Left Column -->
        <div class="space-y-4">
          <label class="block text-sm font-medium mb-1">Last Name</label>
          <input name="surname" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">First Name</label>
          <input name="firstName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Middle Name</label>
          <input name="middleName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Date of Birth</label>
          <input name="dateOfBirth" type="date" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none"/>
          
          <label class="block text-sm font-medium mb-1">Place of Birth</label>
          <input name="placeOfBirth" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Gender</label>
            <select name="gender" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none">
              <option disabled selected>Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          
          <label class="block text-sm font-medium mb-1">Civil Status</label>
          <select name="civilStatus" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none">
            <option disabled selected>Select</option>
            <option>Single</option>
            <option>Married</option>
            <option>Widowed</option>
            <option>Separated</option>
          </select>
          
          <label class="block text-sm font-medium mb-1">Citizenship</label>
          <input name="citizenship" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Blood Type</label>
          <input name="bloodType" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Height</label>
          <input name="height" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Weight</label>
          <input name="weight" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">GSIS ID NO.</label>
          <input name="gsisIdNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">PAG-IBIG NO.</label>
          <input name="pagibigIdNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
        </div>

        <!-- Right Column -->
        <div class="space-y-4">
          <label class="block text-sm font-medium mb-1">Residential Address</label>
          <input name="residentialAddress" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Zip Code</label>
          <input name="residentialAddressZipCode" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Telephone No.</label>
          <input name="residentialAddressTelephoneNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />

          <label class="block text-sm font-medium mb-1">Permanent Address</label>
          <input name="permanentAddress" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Zip Code</label>
          <input name="permanentAddressZipCode" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Telephone No.</label>
          <input name="permanentAddressTelephoneNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Cellphone No.</label>
          <input name="cellphoneNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Email Address</label>
          <input type="email" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">Agency Employee No.</label>
          <input name="agencyEmployeeNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">TIN NUMBER</label>
          <input name="tinNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">PHILHEALTH NO.</label>
          <input name="philhealthIdNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          
          <label class="block text-sm font-medium mb-1">SSS NO.</label>
          <input name="sssNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
        </div>
      </div>
      <!-- BUTTONS -->
      <div class="flex justify-center gap-4">
        <button type="submit" class="px-10 py-2 bg-blue-700 rounded-md hover:bg-blue-800 font-medium text-white">Next</button>
      </div>
    </form>
  </body>
</html>
