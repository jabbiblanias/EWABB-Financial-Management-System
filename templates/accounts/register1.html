<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white font-sans">
    <!-- Navbar -->
    <nav class="bg-[#003366] px-6 py-4 flex justify-between items-center">
      <h1 class="text-white font-bold text-xl">EWABB</h1>
      <div class="space-x-4">
        <button class="bg-[#4da3ff] hover:bg-[#378bdb] text-white px-4 py-2 rounded">Register now</button>
        <button class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded">Login</button>
      </div>
    </nav> 

    <!-- Progress Bar -->
    <div class="w-full bg-gray-100 py-4">
      <div class="flex justify-center space-x-10">
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold">1</div>
          <span class="font-medium">Member Personal Information</span>
        </div>
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">2</div>
          <span class="font-medium">Spouse and Family Information</span>
        </div>
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">3</div>
          <span class="font-medium">Upload ID for Verification</span>
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="max-w-7xl mx-auto p-6">
      <h2 class="text-3xl font-bold mb-2">Personal Information</h2>
      <p class="mb-6">• Please fill out the form with accurate information</p>

      <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Left Column -->
        <div class="space-y-4">
          <input type="text" placeholder="Enter your Last name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter your First name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter your Middle name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="DD/MM/YYYY" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Place of Birth" class="w-full border px-4 py-2 rounded" />

          <select class="w-full border px-4 py-2 rounded">
            <option disabled selected>Male/Female/Other</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>

          <select class="w-full border px-4 py-2 rounded">
            <option disabled selected>Single/Married/Widowed/Separated</option>
            <option>Single</option>
            <option>Married</option>
            <option>Widowed</option>
            <option>Separated</option>
          </select>

          <input type="text" placeholder="Enter your citizenship" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter your blood type" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Height" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Weight" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="GSIS ID NO." class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="PAG-IBIG NO." class="w-full border px-4 py-2 rounded" />
        </div>

        <!-- Right Column -->
        <div class="space-y-4">
          <input type="text" placeholder="Residential Address" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Zip Code" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Telephone No." class="w-full border px-4 py-2 rounded" />

          <input type="text" placeholder="Permanent Address" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Zip Code" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Telephone No." class="w-full border px-4 py-2 rounded" />

          <input type="text" placeholder="Cellphone No." class="w-full border px-4 py-2 rounded" />
          <input type="email" placeholder="Email Address" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Agency Employee No." class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="TIN NUMBER" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="PHILHEALTH NO." class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="SSS NO." class="w-full border px-4 py-2 rounded" />
        </div>

        <!-- Full Width Button -->
        <div class="col-span-1 md:col-span-2">
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded">Next</button>
        </div>
      </form>
    </div>
  </body>
</html>
