<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white font-sans">
    <!-- Navbar -->
    <nav class="bg-[#003366] px-6 py-4 flex justify-between items-center">
      <h1 class="text-white font-bold text-xl">EWABB</h1>
      <div class="space-x-4">
        <!-- <button class="bg-[#4da3ff] hover:bg-[#378bdb] text-white px-4 py-2 rounded">Register now</button> -->
        <button class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded">Login</button>
      </div>
    </nav>

    <!-- Progress Bar -->
    <div class="w-full bg-gray-100 py-4">
      <div class="flex justify-center space-x-10">
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold">1</div>
          <span class="font-medium">Member Personal Information</span>
        </div>
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">2</div>
          <span class="font-medium">Spouse and Family Information</span>
        </div>
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">3</div>
          <span class="font-medium">Upload ID for Verification</span>
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="max-w-7xl mx-auto p-6">
      <h2 class="text-3xl font-bold mb-2">Personal Information</h2>
      <p class="mb-6">• Please fill out the form with accurate information</p>

      <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Left Column -->
        <div class="space-y-4">
          <div>
            <label class="block mb-1 font-medium">Last Name</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">First Name</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Middle Name</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Date of Birth</label>
            <div class="relative">
              <input type="text" class="w-full border px-4 py-2 rounded" placeholder="DD/MM/YYYY" />
              <div class="absolute right-3 top-2.5 text-gray-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              </div>
            </div>
          </div>
          <div>
            <label class="block mb-1 font-medium">Place of Birth</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Gender</label>
            <select class="w-full border px-4 py-2 rounded">
              <option disabled selected>Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <div>
            <label class="block mb-1 font-medium">Civil Status</label>
            <select class="w-full border px-4 py-2 rounded">
              <option disabled selected>Select</option>
              <option>Single</option>
              <option>Married</option>
              <option>Widowed</option>
              <option>Separated</option>
            </select>
          </div>
          <div>
            <label class="block mb-1 font-medium">Citizenship</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Blood Type</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Height</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Weight</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">GSIS ID NO.</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">PAG-IBIG NO.</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
        </div>

        <!-- Right Column -->
        <div class="space-y-4">
          <div>
            <label class="block mb-1 font-medium">Residential Address</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
      
          <div>
            <label class="block mb-1 font-medium">Permanent Address</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Zip Code</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Telephone No.</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Cellphone No.</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Email Address</label>
            <input type="email" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">Agency Employee No.</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">TIN NUMBER</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">PHILHEALTH NO.</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block mb-1 font-medium">SSS NO.</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
        </div>

        <!-- Full Width Button -->
        <div class="col-span-1 md:col-span-2">
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded">Next</button>
        </div>
      </form>
    </div>
  </body>
</html>
