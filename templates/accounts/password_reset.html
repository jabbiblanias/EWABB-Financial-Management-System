{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | EWABB</title>
  {% tailwind_css %}
</head>

<body class="bg-gray-100 dark:bg-gray-900 font-sans transition-colors duration-300">

  <!-- Navbar -->
  <nav class="bg-blue-900 dark:bg-gray-800 px-6 py-4 flex justify-between items-center shadow-md">
    <h1 class="text-white font-bold text-xl">EWABB</h1>
    <a href="{% url 'login' %}"
       class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded">
      Back to Login
    </a>
  </nav>

  <!-- Reset Password Section -->
  <section class="flex items-center justify-center min-h-screen px-4 -mt-12">
    <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-8 shadow-2xl text-center">

      <!-- Header -->
      <h2 class="text-2xl font-bold text-blue-900 dark:text-blue-300 mb-2">Reset Your Password</h2>
      <p class="text-gray-600 dark:text-gray-300 mb-6">
        Please enter your current password and create a new one.
      </p>

      <!-- Django Messages -->
      {% if messages %}
      <div class="space-y-2 mb-4">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-md text-sm border
          {% if message.tags == 'error' %}
            bg-red-100 text-red-700 border-red-300
          {% elif message.tags == 'success' %}
            bg-green-100 text-green-700 border-green-300
          {% else %}
            bg-blue-100 text-blue-700 border-blue-300
          {% endif %}
        ">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <!-- Form -->
      <form method="POST" class="space-y-5">
        {% csrf_token %}

        <!-- Current Password -->
        <div class="relative text-left">
          <label class="text-sm font-medium">Current Password</label>
          <input id="current_password" name="current_password" type="password"
                 placeholder="Enter your current password"
                 class="w-full mt-1 border border-gray-300 rounded-md px-4 py-2 pr-10 text-sm focus:ring-2 focus:ring-blue-400"
                 required />
          <button type="button" onclick="togglePassword('current_password','eyeCur','eyeCurOff')"
                  class="absolute right-3 top-9 text-gray-500">
            <svg id="eyeCur" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg id="eyeCurOff" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a9.969 9.969 0 012.868-4.592m3.791-2.426A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.958 9.958 0 01-4.043 5.197M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
            </svg>
          </button>
        </div>

        <!-- New Password -->
        <div class="relative text-left">
          <label class="text-sm font-medium">New Password</label>
          <input id="password" name="password" type="password" minlength="8"
                 placeholder="Enter new password"
                 pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                 title="Must have: 8+ characters, number, lowercase, uppercase"
                 class="w-full mt-1 border border-gray-300 rounded-md px-4 py-2 pr-10 text-sm focus:ring-2 focus:ring-blue-400"
                 required oninput="checkPasswordMatch()" />

          <button type="button" onclick="togglePassword('password','eyeNew','eyeNewOff')"
                  class="absolute right-3 top-9 text-gray-500">
            <svg id="eyeNew" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg id="eyeNewOff" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a9.969 9.969 0 012.868-4.592m3.791-2.426A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.958 9.958 0 01-4.043 5.197M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
            </svg>
          </button>
        </div>

        <!-- Confirm Password -->
        <div class="relative text-left">
          <label class="text-sm font-medium">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password"
                 placeholder="Re-enter password"
                 class="w-full mt-1 border border-gray-300 rounded-md px-4 py-2 pr-10 text-sm focus:ring-2 focus:ring-blue-400"
                 required oninput="checkPasswordMatch()" />
          <button type="button" onclick="togglePassword('confirm_password','eyeCon','eyeConOff')"
                  class="absolute right-3 top-9 text-gray-500">
            <svg id="eyeCon" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg id="eyeConOff" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a9.969 9.969 0 012.868-4.592m3.791-2.426A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.958 9.958 0 01-4.043 5.197M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
            </svg>
          </button>

          <p id="matchMessage" class="text-xs mt-2"></p>
        </div>

        <!-- Submit Button -->
        <button type="submit"
          class="w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-2.5 rounded-md">
          Update Password
        </button>
      </form>

    </div>
  </section>

  <!-- JS -->
  <script>
    function togglePassword(inputId, eyeId, eyeOffId) {
      const input = document.getElementById(inputId);
      const eyeIcon = document.getElementById(eyeId);
      const eyeOffIcon = document.getElementById(eyeOffId);

      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";

      eyeIcon.classList.toggle("hidden", !isPassword);
      eyeOffIcon.classList.toggle("hidden", isPassword);
    }

    function checkPasswordMatch() {
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm_password").value;
      const message = document.getElementById("matchMessage");

      if (!confirm) { message.textContent = ""; return; }

      if (password === confirm) {
        message.textContent = "✓ Passwords match";
        message.className = "text-green-600 text-xs mt-2";
      } else {
        message.textContent = "✗ Passwords do not match";
        message.className = "text-red-500 text-xs mt-2";
      }
    }
  </script>

</body>
</html>
