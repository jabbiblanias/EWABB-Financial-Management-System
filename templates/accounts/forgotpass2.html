{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | EWABB</title>
  {% tailwind_css %}
</head>

<body class="bg-gray-100 dark:bg-gray-900 font-sans transition-colors duration-300">

  <!-- Navbar -->
  <nav class="bg-blue-900 dark:bg-gray-800 px-6 py-4 flex justify-between items-center shadow-md">
    <h1 class="text-white font-bold text-xl">EWABB</h1>
    <div class="space-x-4">
      <a href="{% url 'login' %}" class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded inline-block">
        Back to Login
      </a>
    </div>
  </nav>

  <!-- Reset Password Form -->
  <section class="flex items-center justify-center min-h-screen px-4 -mt-12">
    <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-8 shadow-2xl text-center transition-colors duration-300">

      <!-- Header -->
      <h2 class="text-2xl font-bold text-blue-900 dark:text-blue-300 mb-2">Reset Your Password</h2>
      <p class="text-gray-600 dark:text-gray-300 mb-6">
        Please enter your current password and create a new one.
      </p>

      <!-- Form -->
      <form method="POST" class="space-y-5">
        {% csrf_token %}
        
        <!-- Current Password -->
        <div class="text-left">
          <label for="current_password" class="block text-gray-700 dark:text-gray-300 font-medium mb-1">
            Current Password
          </label>
          <input type="password" id="current_password" name="current_password" required
            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-gray-50 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-800">
        </div>

        <!-- New Password -->
        <div class="text-left">
          <label for="new_password" class="block text-gray-700 dark:text-gray-300 font-medium mb-1">
            New Password
          </label>
          <input type="password" id="new_password" name="new_password" required
            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-gray-50 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-800">
        </div>

        <!-- Confirm New Password -->
        <div class="text-left">
          <label for="confirm_password" class="block text-gray-700 dark:text-gray-300 font-medium mb-1">
            Confirm New Password
          </label>
          <input type="password" id="confirm_password" name="confirm_password" required
            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-gray-50 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-800">
        </div>

        <!-- Submit -->
        <button type="submit"
          class="w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-2.5 rounded-md transition">
          Update Password
        </button>
      </form>

    </div>
  </section>

</body>
</html>
