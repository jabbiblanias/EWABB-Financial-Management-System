<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r">
      <div class="p-6 text-2xl font-bold text-[#1f2b6c]">EWABB</div>
      <nav class="mt-6">
        <a href="#" class="flex items-center px-6 py-3 text-[#3d5af1] font-semibold bg-[#f1f5ff]">
          <span class="w-5 mr-3 inline-block"></span>
          Dashboard
        </a>
        <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
          <span class="w-5 mr-3 inline-block"></span>
          Transactions
        </a>
        <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
          <span class="w-5 mr-3 inline-block"></span>
          Loans
        </a>
        <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
          <span class="w-5 mr-3 inline-block"></span>
          Appointments
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">
      <!-- Top Bar -->
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-semibold text-[#1f2b6c]">Appointments</h1>
        <div class="flex items-center space-x-4">
          <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
          <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
          <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
          <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-[#3d5af1] rounded-full flex items-center justify-center text-white font-semibold">M</div>
            <span class="text-sm font-medium">Maribel Yan</span>
          </div>
        </div>
      </div>

      <!-- Appointment Card (Form Only) -->
       <div class="bg-white rounded-xl shadow p-8 w-full max-w-5xl mt-4">
        <div class="grid grid-cols-2 gap-8">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
            <input type="text" value="April 12, 2025" class="w-full bg-gray-100 text-gray-700 px-4 py-2 rounded-md" disabled>
          </div>
          <div class="flex items-center space-x-2">
            <label class="text-sm font-medium text-gray-700">Time</label>
            <select class="border border-gray-300 rounded-md px-2 py-1 text-sm">
              <option>10</option>
            </select>
            <span>:</span>
            <select class="border border-gray-300 rounded-md px-2 py-1 text-sm">
              <option>00</option>
            </select>
            <select class="border border-gray-300 rounded-md px-2 py-1 text-sm">
              <option>AM</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Appointment Type</label>
            <select class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm">
              <option>Choose Appointment Type</option>
            </select>
          </div>
          <button class="w-full bg-[#2F49D1] text-white py-2 rounded-md font-medium">Save</button>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
