{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" 
  />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">

  <title>Login</title>
  <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">

  <style>
    /* Mobile optimization */
    body, input, button {
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    .safe-area {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Adjust container width for smaller devices */
    @media (max-width: 640px) {
      .login-container {
        max-width: 90%;
        padding: 1.5rem;
      }
      h2 {
        font-size: 1.5rem; /* slightly smaller header */
      }
      input, button {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 400px) {
      .login-container {
        max-width: 95%;
        padding: 1.25rem;
      }
      h2 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen safe-area px-4 sm:px-0">
  <div class="bg-white rounded-xl shadow-md p-8 w-full max-w-md login-container">
    <h2 class="text-2xl font-bold text-center mb-6">Login to your account</h2>

    {% if messages %}
    <div class="space-y-2">
      {% for message in messages %}
        <div class="mb-4 p-3 text-sm flex justify-between rounded-lg
                    {% if message.tags == 'error' %} bg-red-100 border border-red-400 text-red-800
                    {% elif message.tags == 'warning' %} bg-yellow-100 border border-yellow-400 text-yellow-800
                    {% elif message.tags == 'success' %} bg-green-100 border border-green-400 text-green-800
                    {% else %} bg-gray-100 border border-gray-400 text-gray-800 {% endif %}">
          {{ message }}
          <button onclick="this.parentElement.remove()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <!-- Email/Username -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email or Username</label>
        <input id="emailUsername" name="emailUsername" type="text"
          placeholder="Enter your username or email"
          value="{{ request.session.identifier|default:'' }}"
          class="w-full px-4 py-2 border border-gray-300 rounded-md pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 file-input-error"
          title="Can't find account" required/>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input id="password" name="password" type="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2 border border-gray-300 rounded-md pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500" required/>
          <!-- Toggle eye icon -->
          <div onclick="togglePassword()" class="absolute inset-y-0 right-3 flex items-center cursor-pointer">
            <!-- Eye (visible) -->
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <!-- Eye off (hidden) -->
            <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          </div>
        </div>
        <div class="flex justify-end items-center">
          <a href="#" class="text-sm text-blue-500 hover:underline">Forgot password?</a>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md mt-4 font-semibold transition-all duration-300">
        Login now
      </button>

      <!-- Register link -->
      <p class="text-center text-sm text-gray-500 mt-4">
        Don't Have An Account?
        <a href="{% url 'register1' %}" class="text-blue-600 font-medium hover:underline">Register</a>
      </p>
    </form>
  </div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");
      const eyeOffIcon = document.getElementById("eyeOffIcon");

      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      eyeIcon.classList.toggle("hidden", !isPassword);
      eyeOffIcon.classList.toggle("hidden", isPassword);
    }
  </script>
</body>
</html>
