<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EWA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #f5f8fa;
      font-family: Inter, sans-serif;
    }
  </style>
</head>

<body>
  <div
    class="min-h-screen flex justify-center items-center bg-[#f5f8fa] px-4"
  >
    <form
      class="bg-white rounded-lg shadow-md py-10 px-8 w-full max-w-sm"
      action="#"
      onsubmit="return false;"
    >
      <h1
        class="text-center font-semibold text-gray-900 text-lg leading-6 mb-7 select-none"
      >
        Login to your account
      </h1>

      <div class="mb-5">
        <label
          for="email"
          class="block text-xs font-medium text-gray-600 select-none mb-1"
          >Email</label
        >
        <input
          type="email"
          id="email"
          name="email"
           class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-400 placeholder:text-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400 pr-10"
          value="Enter your email"
          required
        />
      </div>

      <div class="mb-6 relative">
        <label
          for="password"
          class="block text-xs font-medium text-gray-600 select-none mb-1"
          >Password</label
        >
        <a
          href="#"
          class="absolute right-3 top-1 text-xs font-semibold text-blue-600 select-none hover:underline"
          >Forgot ?</a
        >
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-400 placeholder:text-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400 pr-10"
          required
        />
        <!-- Eye icon inside input on right -->
        <button
          type="button"
          tabindex="-1"
          aria-label="Toggle password visibility"
          class="absolute right-3 top-2/4 -translate-y-2/4 text-gray-400 hover:text-gray-600"
          onclick="togglePassword()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              id="eye-icon"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
            <path
              id="eye-outline"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 
              8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 
              7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
        </button>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm py-2 rounded-md mb-6 select-none transition-colors"
      >
        Login now
      </button>

      <p
        class="text-center text-xs text-gray-500 select-none font-light"
      >
        Don’t Have An Account ? <a href="#" class="text-blue-600 font-semibold hover:underline">Register</a>
      </p>
    </form>
  </div>

  <script>
    function togglePassword() {
      const pwdInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      const eyeOutline = document.getElementById('eye-outline');
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        eyeIcon.setAttribute(
          'd',
          'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.956 9.956 0 012.223-3.607M6.11 6.11A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.223 2.04M15 12a3 3 0 11-6 0 3 3 0 016 0z'
        );
        eyeOutline.style.display = 'none';
      } else {
        pwdInput.type = 'password';
        eyeIcon.setAttribute('d', 'M15 12a3 3 0 11-6 0 3 3 0 016 0z');
        eyeOutline.style.display = 'block';
      }
    }
  </script>
</body>

</html>
