<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Modal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Modal Background -->
  <div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
    <!-- Modal Card -->
    <div class="bg-white rounded-md shadow-lg w-[360px] p-6">
    
        
      <!-- Illustration -->
      <div class="flex justify-center mb-4">
        <img src="check.png" alt="OTP Illustration" class="w-28 h-28">
      </div>
      
      <!-- OTP Verification Label -->
      <h2 class="flex justify-center text-2xl text-gray-800 mb-2">Success!</h2>
      
     
      
      <!-- Helper text -->
      <p class="text-center text-xl text-gray-500 mb-4">Congratulation! Kindly wait for Approval</p>
      
      <!-- Verify Button -->
      <button class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700">
        Continue 
      </button>
      
    </div>
  </div>

</body>
</html>
