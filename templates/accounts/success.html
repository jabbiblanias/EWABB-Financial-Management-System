{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Modal</title>
  {% tailwind_css %}
  {% load static %}
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Modal Card -->
    <div class="bg-white rounded-md shadow-lg w-[360px] p-6">
    
        
      <!-- Illustration -->
      <div class="flex justify-center mb-4">
        <img src="{% static 'accounts/images/check.png' %}" alt="OTP Illustration" class="w-28 h-28">
      </div>
      
      <!-- OTP Verification Label -->
      <h2 class="flex justify-center text-2xl text-gray-800 mb-2">Success!</h2>
      
      <!-- Helper text -->
      <p class="text-center text-xl text-gray-500 mb-4">Congratulations! Kindly wait for Approval</p>
      
      <!-- Verify Button -->
       <div class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 text-center">
        <a href="{% url 'login' %}">
        Continue 
      </a>
       </div>
      
      
    </div>
</body>
</html>
