<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spouse and Family Information</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white font-sans">
    <!-- Navbar -->
    <nav class="bg-[#003366] px-6 py-4 flex justify-between items-center">
      <h1 class="text-white font-bold text-xl">EWABB</h1>
      <div class="space-x-4">
        <button class="bg-[#4da3ff] hover:bg-[#378bdb] text-white px-4 py-2 rounded">Register now</button>
        <button class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded">Login</button>
      </div>
    </nav>

    <!-- Progress Bar -->
    <div class="w-full bg-gray-100 py-4">
      <div class="flex justify-center space-x-10">
        <div class="flex items-center space-x-2 text-black">
          <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center font-bold">1</div>
          <span class="font-medium">Member Personal Information</span>
        </div>
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold">2</div>
          <span class="font-medium">Spouse and Family Information</span>
        </div>
        <div class="flex items-center space-x-2 text-black">
          <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center font-bold">3</div>
          <span class="font-medium">Upload ID for Verification</span>
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="max-w-7xl mx-auto p-6">
      <h2 class="text-3xl font-bold mb-6">Spouse and Family Information</h2>
      <form class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Spouse Info -->
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Spouse's Surname</label>
            <input type="text" placeholder="Enter your Surname" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">First Name</label>
            <input type="text" placeholder="Enter your First name" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Middle Name</label>
            <input type="text" placeholder="Enter your Middle name" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Occupation</label>
            <input type="text" placeholder="Enter occupation" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Employer/ Business Name</label>
            <input type="text" placeholder="Enter your business name" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Business Address</label>
            <input type="text" placeholder="Enter your business address" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Telephone No.</label>
            <input type="text" placeholder="Enter your Telephone Number" class="w-full border px-4 py-2 rounded" />
          </div>
        </div>

        <!-- Children Names -->
        <div class="space-y-4">
          <label class="block text-sm font-medium">Name of Children (Write in full name and list all)</label>
          <input type="text" placeholder="Enter the full name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter the full name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter the full name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter the full name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter the full name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter the full name" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Enter the full name" class="w-full border px-4 py-2 rounded" />
        </div>

        <!-- Children Birthdates -->
        <div class="space-y-4">
          <label class="block text-sm font-medium">Date of Birth (mm/dd/yy)</label>
          <input type="text" placeholder="Date of birth" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Date of birth" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Date of birth" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Date of birth" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Date of birth" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Date of birth" class="w-full border px-4 py-2 rounded" />
          <input type="text" placeholder="Date of birth" class="w-full border px-4 py-2 rounded" />
        </div>

        <!-- Buttons -->
        <div class="col-span-1 md:col-span-3 flex justify-center gap-4 pt-6">
          <button type="button" class="px-8 py-2 border border-black rounded hover:bg-gray-100">Back</button>
          <button type="submit" class="px-8 py-2 bg-blue-700 text-white rounded hover:bg-blue-800">Next</button>
        </div>
      </form>
    </div>
  </body>
</html>
