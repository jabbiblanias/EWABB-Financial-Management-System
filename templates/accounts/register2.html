{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Registration</title>
    {% tailwind_css %}
  </head>
  <body class="font-sans leading-normal">
    <!-- Navbar -->
    <nav class="bg-blue-900 px-6 py-4 flex justify-between items-center">
      <h1 class="text-white font-bold text-xl">EWABB</h1>
      <div class="space-x-4">
        <button class="bg-yellow-400 hover:bg-yellow-400 text-black px-4 py-2 rounded">Login</button>
      </div>
    </nav>

    <!-- Progress Bar -->
    <div class="w-full py-4">
      <div class="flex justify-center space-x-10">
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">1</div>
          <span class="font-medium">Member Personal Information</span>
        </div>
        <div class="flex items-center space-x-2 text-black">
          <div class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold">2</div>
          <span class="font-medium text-yellow-400">Family Background</span>
        </div>
        <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">3</div>
          <span class="font-medium">Create Account</span>
        </div>
      </div>
    </div>

    <!-- Main Container -->
    <form class="max-w-3xl mx-auto px-10 py-10" method="POST" action="{% url 'register2' %}">
      {% csrf_token %}
      <h2 class="text-3xl font-bold text-center mb-2">Family Background</h2>
      <p class="text-center text-sm mb-10">• Please leave it blank if you do not have spouse and children</p>

      <!-- SPOUSE Section -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
        <div class="ml-3">
          <label class="block text-sm font-medium mb-1">Spouse's Surname</label>
          <input name="spouseSurname" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />

          <label class="block text-sm font-medium mb-1">First Name</label>
          <input name="spouseFirstName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />

          <label class="block text-sm font-medium mb-1">Middle Name</label>
          <input name="spouseMiddleName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />

          <label class="block text-sm font-medium mb-1">Occupation</label>
          <input name="occupation" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
        </div>
        <div class="ml-3">
          <label class="block text-sm font-medium mb-1">Employer/ Business Name</label>
          <input name="employerBusinessName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />

          <label class="block text-sm font-medium mb-1">Business Address</label>
          <input name="businessAddress" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />

          <label class="block text-sm font-medium mb-1">Telephone No.</label>
          <input name="businessTelephoneNo" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
        </div>
      </div>

      <!-- CHILDREN Section -->
      <div id="children-container"class="mb-12 ml-3">
        <div class="flex justify-between items-center mb-4">
          <label class="font-semibold text-lg">Children</label>
          <button type="button" onclick=addChild() class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-md text-lg font-semibold text-black">+</button>
        </div>
        <div class="child-entry">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2">
              <label class="block text-sm font-medium mb-1">Child Name (Full Name)</label>
              <input name="childName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-blue-400 focus:outline-none" />
            </div>
            <div class="md:col-span-1">
              <label class="block text-sm font-medium mb-1">Date of Birth</label>
              <input name="childDateOfBirth" type="date" class="w-full border border-gray-300 px-4 py-2 rounded-md mb-4 focus:ring-2 focus:ring-blue-400 focus:outline-none" />
            </div>
          </div>
        </div>
        
      </div>

      <!-- EMERGENCY CONTACT Section -->
      <div class="mb-12 ml-3">
        <h3 class="font-semibold text-lg mb-4">Emergency Person to Contact</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="col-span-2">
            <div class="mb-4">
              <label class="block text-sm font-medium mb-1">Name (Full Name)</label>
              <input name="emergencyContactName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-blue-400 focus:outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Address</label>
              <input name="emergencyContactAddress" type="text" placeholder="Enter the address" class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-blue-400 focus:outline-none" />
            </div>
          </div>
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="flex justify-center gap-4">
        <a class="px-10 py-2 border border-gray-400 rounded-md hover:bg-gray-100 font-medium">Back</a>
        <button type="submit" class="px-10 py-2 bg-blue-700 rounded-md hover:bg-blue-800 font-medium text-white">Next</button>
      </div>
    </form>
      <script>
        function addChild() {
          const container = document.getElementById('children-container');
          const newChild = document.createElement('div');
          newChild.classList.add('child-entry');
          newChild.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div class="md:col-span-2">
                <label class="block text-sm font-medium mb-1">Child Name (Full Name)</label>
                <input name="childName" type="text" class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-blue-400 focus:outline-none" />
              </div>
              <div class="md:col-span-1">
                <label class="block text-sm font-medium mb-1">Date of Birth</label>
                <input name="date" type="date" class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-blue-400 focus:outline-none" />
              </div>
              <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-700 text-sm font-medium mb-4">
                Remove
              </button>
            </div>

          `;
          container.appendChild(newChild);
        }
      </script>
  </body>
</html>
