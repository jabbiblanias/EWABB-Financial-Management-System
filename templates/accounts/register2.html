<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body class="bg-white font-sans">
    <!-- Navbar -->
    <nav class="bg-[#003366] px-6 py-4 flex justify-between items-center">
      <h1 class="text-white font-bold text-xl">EWABB</h1>
      <div class="space-x-4">
        <button class="bg-[#4da3ff] hover:bg-[#378bdb] text-white px-4 py-2 rounded">Register now</button>
        <button class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded">Login</button>
      </div>
    </nav>

    <!-- Progress Bar -->
    <div class="w-full bg-gray-100 py-4">
      <div class="flex justify-center space-x-10">
       <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">1</div>
          <span class="font-medium">Member Personal Information</span>
        </div>
        <div class="flex items-center space-x-2 text-black">
          <div class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold">2</div>
          <span class="font-medium">Family Background</span>
        </div>
       <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">3</div>
          <span class="font-medium">Create Account</span>
        </div>
      </div>
    </div>


    <!-- Main Container -->
    <div class="max-w-6xl mx-auto px-6 py-10">
      <h2 class="text-3xl font-bold text-center mb-2">Family Background</h2>
      <p class="text-center text-sm mb-10">• Please leave it blank if you do not have spouse and children</p>

      <!-- SPOUSE Section -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div>
          <label class="block text-sm font-medium mb-1">Spouse's Surname</label>
          <input type="text" class="w-full border px-4 py-2 rounded" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Employer/ Business Name</label>
          <input type="text" class="w-full border px-4 py-2 rounded" />
        </div>
        <div></div>
        <div>
          <label class="block text-sm font-medium mb-1">First Name</label>
          <input type="text" class="w-full border px-4 py-2 rounded" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Business Address</label>
          <input type="text" class="w-full border px-4 py-2 rounded" />
        </div>
        <div></div>
        <div>
          <label class="block text-sm font-medium mb-1">Middle Name</label>
          <input type="text" class="w-full border px-4 py-2 rounded" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Telephone No.</label>
          <input type="text" class="w-full border px-4 py-2 rounded" />
        </div>
        <div></div>
        <div>
          <label class="block text-sm font-medium mb-1">Occupation</label>
          <input type="text" class="w-full border px-4 py-2 rounded" />
        </div>
      </div>

      <!-- CHILDREN Section -->
      <div class="mb-12">
        <h3 class="font-semibold text-lg mb-4">Children</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium mb-1">Child Name (Full Name)</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Date of Birth</label>
            <div class="flex items-center gap-2">
              <div class="relative w-full">
                <input type="text" placeholder="DD/MM/YYYY" class="w-full border px-4 py-2 pl-10 rounded" />
                <i class="fa-regular fa-calendar-days absolute left-3 top-3 text-gray-500"></i>
              </div>
              <button type="button" class="bg-gray-200 px-4 py-2 rounded text-lg font-semibold">+</button>
            </div>
          </div>
        </div>
      </div>

      <!-- EMERGENCY CONTACT Section -->
      <div class="mb-12">
        <h3 class="font-semibold text-lg mb-4">Emergency Person to Contact</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium mb-1">Name (Full Name)</label>
            <input type="text" class="w-full border px-4 py-2 rounded" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Address</label>
            <input type="text" placeholder="Enter the address" class="w-full border px-4 py-2 rounded" />
          </div>
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="flex justify-center gap-4">
        <button type="button" class="px-10 py-2 border border-black rounded hover:bg-gray-100">Back</button>
        <button type="submit" class="px-10 py-2 bg-blue-700 text-white rounded hover:bg-blue-800">Next</button>
      </div>
    </div>
  </body>
</html>
