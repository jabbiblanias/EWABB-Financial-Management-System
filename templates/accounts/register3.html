{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Registration</title>
    {% tailwind_css %}
  </head>
  <body class="font-sans">

    <!-- Navbar -->
    <nav class="bg-[#003366] px-6 py-4 flex justify-between items-center">
      <h1 class="text-white font-bold text-xl">EWABB</h1>
      <div class="space-x-4">
        <button class="bg-[#ffd369] hover:bg-[#e6bc50] text-black px-4 py-2 rounded">Login</button>
      </div>
    </nav>

    <!-- Step Indicator -->
   <div class="w-full py-4">
      <div class="flex justify-center space-x-10">
       <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">1</div>
          <span class="font-medium">Member Personal Information</span>
        </div>
         <div class="flex items-center space-x-2 text-gray-400">
          <div class="w-8 h-8 rounded-full border border-gray-400 text-gray-400 flex items-center justify-center font-bold">2</div>
          <span class="font-medium">Family Background</span>
        </div>
      <div class="flex items-center space-x-2 text-black">
         <div class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold">3</div>
          <span class="font-medium text-yellow-400">Create Account</span>
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="w-full flex justify-center">
      <div class="w-full max-w-md mt-10">
        <h2 class="text-center text-3xl font-bold mb-8">Create an Account</h2>

        <form class="space-y-4" method="POST" action="{% url 'register3' %}">
          {% csrf_token %}
          <!-- Username -->
          <div>
            <label class="text-sm font-medium">Username</label>
            <input name="username" type="text" placeholder="Enter your username" class="w-full mt-1 border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>

          <!-- Email -->
          <div>
            <label class="text-sm font-medium">Email Address</label>
            <input name="email" type="email" placeholder="Enter your email address" class="w-full mt-1 border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>

          <!-- Password -->
          <div>
            <label class="text-sm font-medium">Password</label>
            <input name="password" type="password" placeholder="Enter your password" class="w-full mt-1 border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="text-sm font-medium">Confirm Password</label>
            <input name="confirm_password" type="password" placeholder="Enter your password again" class="w-full mt-1 border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>

          <!-- Buttons -->
          <div class="flex justify-center space-x-6 pt-6">
            <button type="button" class="border px-10 py-2 rounded-md hover:bg-gray-100">Back</button>
            <button type="submit" class="bg-blue-600 text-white px-10 py-2 rounded-md hover:bg-blue-700">Submit</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
