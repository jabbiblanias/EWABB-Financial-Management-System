<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWABB Loans</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
   <body class="bg-gray-50 font-sans">
    <div class="flex h-screen">
      
      <!-- Sidebar -->
      <aside class="w-64 bg-white border-r">
        <div class="p-6 text-2xl font-bold text-[#1f2b6c]">EWABB</div>
        <nav class="mt-6">
          <a href="#" class="flex items-center px-6 py-3 text-[#3d5af1] font-semibold bg-[#f1f5ff]">
             <span class="w-5 mr-3 inline-block"></span> 
             Dashboard</a>
             <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
              <span class="w-5 mr-3 inline-block"></span>
              Transactions </a>
              <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
                <span class="w-5 mr-3 inline-block"></span>
                Loans</a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
                  <span class="w-5 mr-3 inline-block"></span>
                  Appointments</a>
                </nav>
      </aside>

     <!-- Main Content -->
      <main class="flex-1 p-6">
        <!-- Top Bar -->
        <div class="flex justify-between items-center">
          <h1 class="text-xl font-semibold text-[#1f2b6c]">Loans</h1>
          <div class="flex items-center space-x-4">
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <div class="flex items-center space-x-2">
              <div class="w-8 h-8 bg-[#3d5af1] rounded-full flex items-center justify-center text-white font-semibold">M</div>
              <span class="text-sm font-medium">Maribel Yan</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Content -->
        <div class="p-6">
          <div class="bg-white p-4 rounded-t-md">
            <div class="flex justify-between items-center mb-4">
              <h2 class="text-[#1c1c1c] font-semibold">All Loans</h2>
              <div class="flex items-center space-x-2">
                <button class="border border-[#3d5af1] text-[#3d5af1] px-4 py-1 rounded-full hover:bg-[#f1f5ff] text-sm">New Loan</button>
                <button class="w-6 h-6 bg-[url('/icons/filter.svg')] bg-contain"></button>
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="min-w-full text-left text-[#1c1c1c]">
                <thead>
                  <tr class="text-xs text-[#3d5af1]">
                    <th class="py-2 px-4">Amount Loan</th>
                    <th class="py-2 px-4">Term</th>
                    <th class="py-2 px-4">Loan Type</th>
                    <th class="py-2 px-4">Release Amount</th>
                    <th class="py-2 px-4">Installment</th>
                    <th class="py-2 px-4">Status</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                  <tr class="border-t border-gray-200 h-10"></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Pagination -->
          <div class="bg-white p-4 rounded-b-md flex justify-end">
            <nav class="flex space-x-2 text-xs text-[#3d5af1]">
              <button class="hover:underline">&lt; Previous</button>
              <button class="w-5 h-5 bg-[#3d5af1] text-white rounded-full">1</button>
              <button class="hover:underline">2</button>
              <button class="hover:underline">3</button>
              <button class="hover:underline">4</button>
              <button class="hover:underline">Next &gt;</button>
            </nav>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
