{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWABB Transactions</title>
  {% tailwind_css %}
</head>

<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
    {% include 'dashboard/partials/member_nav.html' %}
    <!-- Main Content -->
    <main class="ml-64 mt-[72px] flex-1">
      <div class="bg-white border border-gray-200 rounded-2xl shadow-lg p-6 max-w-6xl mx-auto mt-10">

        <!-- Header + Actions -->
        <div class="flex justify-between items-center mb-6">
          <h1 class="text-xl font-bold text-gray-800">System Notifications</h1>
          <div class="flex items-center gap-3">
            <button
              class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow-sm flex items-center gap-2 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              Mark as Read
            </button>
            <!--<button class="bg-gray-100 hover:bg-gray-200 text-sm font-semibold px-4 py-2 rounded-lg border border-gray-300 transition">
          Delete Selected
        </button>-->
          </div>
        </div>

        <!-- Notification Table -->
        <div class="overflow-x-auto rounded-lg border border-gray-200">
          <table class="min-w-full table-auto">
            <thead class="bg-gray-50 text-sm font-semibold text-gray-700 border-b border-gray-200">
              <tr>
                <th class="px-4 py-3 text-left w-12"><input type="checkbox" class="h-4 w-4" /></th>
                <th class="px-4 py-3 text-left w-12">#</th>
                <th class="px-4 py-3 text-left">Notification</th>
                <th class="px-4 py-3 text-left">Date</th>
                <th class="px-4 py-3 text-left">Status</th>
              </tr>
            </thead>
            <tbody id="table-body" class="text-sm text-gray-700 divide-y divide-gray-100">
              {% include 'notifications/partials/notifications_table_body.html' %}
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div id="pagination-controls">
          {% include 'partials/pagination.html' %}
        </div>
      </div>

    </main>
  </div>
</body>

</html>
