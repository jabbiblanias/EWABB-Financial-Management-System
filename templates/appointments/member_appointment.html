{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments</title>
  {% tailwind_css %}
</head>

<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow">
      <div class="p-6 text-2xl font-bold text-[#1f2b6c]">EWABB</div>
      <nav class="mt-6">
        <a href="{% url 'dashboard' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
          <span class="w-5 mr-3 inline-block"></span>
          Dashboard
        </a>
        <a href="{% url 'transactions' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
          <span class="w-5 mr-3 inline-block"></span>
          Transactions
        </a>
        <a href="{% url 'loans' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]">
          <span class="w-5 mr-3 inline-block"></span>
          Loans
        </a>
        <a href="{% url 'appointments' %}" class="flex items-center px-6 py-3 text-[#3d5af1] font-semibold bg-[#f1f5ff]">
          <span class="w-5 mr-3 inline-block"></span>
          Appointments
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1">
      <!-- Top Bar -->
        <div class="bg-white flex justify-between items-center p-6 shadow">
          <h1 class="text-xl font-semibold text-[#1f2b6c]">Appointments</h1>
          <div class="flex items-center space-x-4">
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <button class="w-8 h-8 bg-[#e0e7ff] rounded-full"></button>
            <div class="flex items-center space-x-2">
              <div class="w-8 h-8 bg-[#3d5af1] rounded-full flex items-center justify-center text-white font-semibold">M</div>
              <span class="text-sm font-medium">Maribel Yan</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-7 mt-10 p-6">
        <div class="w-full col-span-2">
          <div class="bg-white rounded-2xl shadow p-12">
            <div class="flex items-center justify-between mb-4">
              <button id="prev" class="p-2 rounded-lg hover:bg-gray-100" aria-label="Previous month">
                ‹
              </button>

              <div class="text-center">
                <div id="monthYear" class="text-lg font-semibold"></div>
                <div class="text-xs text-gray-500">Click a date to select</div>
              </div>

              <button id="next" class="p-2 rounded-lg hover:bg-gray-100" aria-label="Next month">
                ›
              </button>
            </div>

            <div class="grid grid-cols-7 gap-2 text-center text-sm text-gray-600 mb-2">
              <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>

            <div id="dates" class="grid grid-cols-7 gap-1"></div>
          </div>
        </div>
        <!-- Appointment Card (Form Only) -->
        <div class="bg-white rounded-xl shadow p-8 col-span-1">
          <div class="grid grid-cols-1 gap-8">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
              <input type="date" class="w-full text-center bg-gray-100 text-gray-700 px-4 py-2 rounded-md" disabled>
            </div>
            <div>
              <label class="text-sm font-medium text-gray-700">Time</label>
              <input type="time" class="w-full text-center border border-gray-300 text-gray-700 px-4 py-2 rounded-md focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Appointment Type</label>
              <select class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <option>Choose Appointment Type</option>
              </select>
            </div>
            <button class="w-full bg-[#2F49D1] text-white py-2 rounded-md font-medium">Save</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    // Minimal calendar renderer
    const datesEl = document.getElementById('dates');
    const monthYearEl = document.getElementById('monthYear');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    let today = new Date();
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth(); // 0-indexed

    function renderCalendar(year, month) {
  datesEl.innerHTML = '';

  // 🔹 Adjustable date size here
  const cellHeight = 'h-14';
  const cellWidth = 'w-24';

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();
  const daysInMonth = last.getDate();

  const monthNames = [
    'January','February','March','April','May','June',
    'July','August','September','October','November','December'
  ];
  monthYearEl.textContent = `${monthNames[month]} ${year}`;

  // Blank cells before 1st
  for (let i = 0; i < startDay; i++) {
    const cell = document.createElement('div');
    cell.className = `${cellHeight} ${cellWidth}`;
    datesEl.appendChild(cell);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('button');
    cell.type = 'button';
    cell.className =
      `${cellHeight} ${cellWidth} flex items-center justify-center rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400`;
    cell.textContent = d;

    if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
      cell.classList.add('bg-sky-500', 'text-white');
    }

    cell.addEventListener('click', () => {
      document.querySelectorAll('#dates button').forEach(b => b.classList.remove('ring-2', 'ring-sky-500'));
      cell.classList.add('ring-2', 'ring-sky-500');
      console.log('Selected date:', `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    });

    datesEl.appendChild(cell);
  }
}


    prevBtn.addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar(viewYear, viewMonth);
    });

    nextBtn.addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar(viewYear, viewMonth);
    });

    // initial render
    renderCalendar(viewYear, viewMonth);
  </script>
</body>

</html>
