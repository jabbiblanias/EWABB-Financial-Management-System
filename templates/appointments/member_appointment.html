{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments</title>
  {% tailwind_css %}
  <script src="{% static 'partials/table-utils.js' %}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      fillTableRows('myTable', 10);
    });
  </script>
</head>

<body class="bg-gray-100 font-sans">
  <div class="flex h-full">
    {% include 'dashboard/partials/member_nav.html' %}

    <!-- Main Content -->
    <main class="md:ml-64 md:mr-4 mt-[72px] flex-1">
      <!-- Content -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-7 mt-10 p-6">

        <!-- Calendar -->
        <div class="w-full col-span-3 md:col-span-2">
          <div class="bg-white rounded-2xl shadow px-12 py-6">
            <div class="flex items-center justify-between mb-4">
              <button id="prev" class="p-2 md:p-3 rounded-full hover:bg-gray-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24"
                  stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
              </button>
              <div class="text-center">
                <div id="monthYear" class="text-lg font-semibold"></div>
                <div class="text-xs text-gray-500">
                  Click a date to select
                </div>
              </div>
              <button id="next" class="p-2 md:p-3 rounded-full hover:bg-gray-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24"
                  stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
              </button>
            </div>

            <div class="grid grid-cols-7 gap-2 text-center text-sm text-gray-600 mb-2">
              <div>Sun</div>
              <div>Mon</div>
              <div>Tue</div>
              <div>Wed</div>
              <div>Thu</div>
              <div>Fri</div>
              <div>Sat</div>
            </div>
            <div id="dates" class="grid grid-cols-7 gap-1 min-h-[18rem] md:min-h-[23rem]"></div>
          </div>
        </div>

        <!-- Appointment Form -->
        <div class="bg-white rounded-xl shadow p-8 col-span-3 md:col-span-1">
          <div class="grid grid-cols-1 gap-8">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
              <input id="date" name="date" type="date"
                class="w-full bg-gray-100 text-gray-700 px-4 py-2 rounded-md border border-gray-300" disabled
                required />
              <p id="dateMessage" class="hidden"></p>
            </div>
            <div>
              <label class="text-sm font-medium text-gray-700">Time</label>
              <input id="time" onfocusout="timeMessage()" type="time" name="time"
                class="w-full text-center border border-gray-300 text-gray-700 px-4 py-2 rounded-md focus:ring-2 focus:ring-blue-400 focus:outline-none"
                required />
              <p id="timeMessage" class="hidden"></p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Appointment Type</label>
              <select id="appointmentType" onfocusout="appointmentTypeMessage()" name="appointmentType"
                class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                required>
                <option value="" selected hidden>
                  -- Choose Appointment Type --
                </option>
                <option>Consultation</option>
                <option>Follow-up</option>
                <option>Cashier Transaction</option>
              </select>
              <p id="typeMessage" class="hidden"></p>
            </div>
            <div id="editButtons" class="hidden grid grid-cols-2 gap-7">
              <button id="cancel"
                class="px-10 py-2 bg-red-500 hover:bg-red-600 text-white rounded-md font-medium text-center col-start-1">
                Cancel
              </button>
              <button id="edit" type="button" class="bg-[#2F49D1] text-white py-2 rounded-md font-medium col-end-3">
                Edit
              </button>
            </div>
            <div id="updateButtons" class="hidden grid grid-cols-2 gap-7">
              <button id="back"
                class="px-10 py-2 border border-gray-400 rounded-md hover:bg-gray-100 font-medium text-center col-start-1">
                Back
              </button>
              <button id="submit" onclick="saveAppointment()" type="submit"
                class="bg-[#2F49D1] text-white py-2 rounded-md font-medium col-end-3">
                Update
              </button>
            </div>
            <div id="newButtons" class="grid grid-cols-2 gap-7">
              <button id="clear"
                class="px-10 py-2 border border-gray-400 rounded-md hover:bg-gray-100 font-medium text-center col-start-1">
                Clear
              </button>
              <button id="submit" onclick="saveAppointment()" type="submit"
                class="bg-[#2F49D1] text-white py-2 rounded-md font-medium col-end-3">
                Save
              </button>
            </div>
          </div>
        </div>

        <!-- Appointment Table -->
        <div class="flex justify-between items-center px-6 col-span-3">
          <h1 class="font-semibold text-gray-700">All Appointments</h1>
        </div>
        <div class="bg-white rounded-xl shadow overflow-hidden col-span-3">
          <table class="min-w-full text-left">
            <thead>
              <tr class="text-sm text-blue-500">
                <th class="px-6 py-4">Date</th>
                <th class="px-6 py-4">Time</th>
                <th class="px-6 py-4">Appointment Type</th>
                <th class="px-6 py-4">Status</th>
              </tr>
            </thead>
            <tbody id="table-body" class="bg-white">
              {% include 'appointments/member_appointment_table_body.html' %}
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="px-6 py-4 text-sm text-gray-500 flex justify-end items-center space-x-4 col-span-3">
          <button class="text-blue-500">&lt; Previous</button>
          <button class="w-6 h-6 bg-blue-600 text-white rounded text-xs">
            1
          </button>
          <button class="text-blue-500">2</button>
          <button class="text-blue-500">3</button>
          <button class="text-blue-500">4</button>
          <button class="text-blue-500">Next &gt;</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast"
    class="pointer-events-none fixed inset-x-0 top-4 z-[60] mx-auto w-fit rounded-xl hidden px-4 py-2 text-white shadow-lg"
    role="status"></div>

  <!-- Scripts -->
  <script>
    function dateMessage() {
      const date = document.getElementById("date").value;
      const message = document.getElementById("dateMessage");

      if (date === "") {
        message.textContent = "Pick a date";
        message.classList.remove("hidden");
        message.classList.add("text-red-500", "text-xs", "mt-1");
        return false;
      } else {
        message.classList.add("hidden");
        return true;
      }
    }

    function timeMessage() {
      const time = document.getElementById("time").value;
      const timeMsg = document.getElementById("timeMessage");

      if (time === "") {
        timeMsg.textContent = "Pick a time";
        timeMsg.classList.remove("hidden");
        timeMsg.classList.add("text-red-500", "text-xs", "mt-1");
        return false;
      } else {
        timeMsg.classList.add("hidden");
        return true;
      }
    }

    function appointmentTypeMessage() {
      const appointment_type =
        document.getElementById("appointmentType").value;
      const typeMsg = document.getElementById("typeMessage");

      if (appointment_type === "") {
        typeMsg.textContent = "Pick an appointment type.";
        typeMsg.classList.remove("hidden");
        typeMsg.classList.add("text-red-500", "text-xs", "mt-1");
        return false;
      } else {
        typeMsg.classList.add("hidden");
        return true;
      }
    }

    dateVal = document.getElementById("date");
    timeVal = document.getElementById("time");
    appointmentTypeVal =
      document.getElementById("appointmentType");

    async function saveAppointment() {
      // Convert input date to a Date object
      const inputDate = new Date(dateVal.value); // "2025-08-20" -> Wed Aug 20 2025 ...
      const today = new Date();

      // Clear time part of today (so only the date is compared)
      today.setHours(0, 0, 0, 0);

      const isDateValid = dateMessage();
      const isTimeValid = timeMessage();
      const isTypeValid = appointmentTypeMessage();

      if (isDateValid && isTimeValid && isTypeValid && inputDate > today) {
        try {
          const response = await fetch("{% url 'save_appointment' %}", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": "{{ csrf_token }}",
            },
            body: JSON.stringify({
              date: dateVal.value,
              time: timeVal.value,
              appointmentType: appointmentTypeVal.value,
            }),
          });

          if (!response.ok) {
            // This will now be caught by the catch block below
            throw new Error(`HTTP error: ${response.status}`);
          }

          const data = await response.json();

          if (data.success) {
            showAlert(data.message, "success");
            fetchAppointmentsAndRenderCalendar();
          } else {
            showAlert(data.message, "warning");
          }
        } catch (error) {
          // A single catch block handles all errors from the network request
          // and any custom errors thrown above.
          console.error("Fetch error:", error);
        }
      }
    }
    // Toast notification function
    function showAlert(message, type) {
      const toast = document.getElementById("toast");

      // Remove old color classes before adding new one
      toast.classList.remove("bg-emerald-600", "bg-red-600", "bg-yellow-600");

      // Style by type
      if (type === "success") {
        toast.classList.add("bg-emerald-600"); // green
      } else if (type === "reject") {
        toast.classList.add("bg-red-600"); // red
      } else {
        toast.classList.add("bg-yellow-600"); // yellow default
      }

      // Set message
      toast.textContent = message;

      // Show toast
      toast.classList.remove("hidden");

      // Hide after 4s
      setTimeout(() => toast.classList.add("hidden"), 4000);
    }

    // Calendar
    const datesEl = document.getElementById("dates");
    const monthYearEl = document.getElementById("monthYear");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const dateInput = document.getElementById("date");

    let today = new Date();
    let currentYear = today.getFullYear();
    let currentMonth = today.getMonth();
    let appointments = {}; // This will hold the fetched data

    async function fetchAppointmentsAndRenderCalendar() {
      try {
        const url = `{% url 'member_appointments' %}?year=${currentYear}&month=${currentMonth + 1
          }`;

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();

        if (data.success) {
          appointments = data.appointments;
        } else {
          console.error("Server error:", data.error);
          showAlert("Error loading appointments.", "warning");
          appointments = {};
        }

        renderCalendar(currentYear, currentMonth);
      } catch (error) {
        console.error("Error fetching appointments:", error);
        showAlert(
          "Error fetching appointments. Please try again later.",
          "warning"
        );
        renderCalendar(currentYear, currentMonth); // Render calendar even on failure
      }
    }

    function renderCalendar(year, month) {
      datesEl.innerHTML = "";
      // use a smaller responsive height for mobile and remove fixed width
      const cellHeight = "h-12 md:h-14";
      const cellWidth = "";

      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const startDay = first.getDay();
      const daysInMonth = last.getDate();

      const monthNames = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];
      monthYearEl.textContent = `${monthNames[month]} ${year}`;

      for (let i = 0; i < startDay; i++) {
        const cell = document.createElement("div");
        cell.className = `${cellHeight} ${cellWidth}`;
        datesEl.appendChild(cell);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = `${cellHeight} ${cellWidth} flex items-center justify-center rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 hover:bg-gray-100`;
        cell.textContent = d;

        const dayKey = `${year}-${month + 1}-${d}`;
        const appointment = appointments[dayKey];

        if (appointment) {
          cell.classList.remove("hover:bg-gray-100");
          cell.classList.add(
            appointment.color,
            "text-white",
            "hover:opacity-80",
            "shadow-md"
          );
        }

        if (
          year === today.getFullYear() &&
          month === today.getMonth() &&
          d === today.getDate()
        ) {
          cell.classList.remove("hover:bg-gray-100");
          cell.classList.add("bg-sky-500", "text-white", "hover:opacity-80", "shadow-md");
        }

        cell.addEventListener("click", () => {
          if (appointment) {
            dateVal.value = dayKey;
            timeVal.value = appointment.time;
            appointmentTypeVal.value = appointment.type;
            document.getElementById("newButtons").classList.add("hidden");
            document.getElementById("editButtons").classList.remove("hidden");
          }
          else {
            document.getElementById("newButtons").classList.remove("hidden");
            document.getElementById("editButtons").classList.add("hidden");
          }
          document
            .querySelectorAll("#dates button")
            .forEach((b) => b.classList.remove("ring-2", "ring-sky-500"));
          cell.classList.add("ring-2", "ring-sky-500");
          const pickDate = `${year}-${String(month + 1).padStart(
            2,
            "0"
          )}-${String(d).padStart(2, "0")}`;
          dateInput.value = pickDate;
          const message = document.getElementById("dateMessage");
          if (new Date(pickDate) <= today) {
            message.textContent = "Date cannot be in the past or today";
            message.className = "text-red-500 text-xs mt-1";
            dateInput.value = "";
          } else {
            message.className = "hidden";
          }
        });

        datesEl.appendChild(cell);
      }
    }

    document.getElementById("edit").addEventListener("click", () => {
      document.getElementById("updateButtons").classList.remove("hidden");
      document.getElementById("editButtons").classList.add("hidden");
    });

    document.getElementById("back").addEventListener("click", () => {
      document.getElementById("updateButtons").classList.add("hidden");
      document.getElementById("editButtons").classList.remove("hidden");
    });

    prevBtn.addEventListener("click", () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      fetchAppointmentsAndRenderCalendar();
    });

    nextBtn.addEventListener("click", () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      fetchAppointmentsAndRenderCalendar();
    });

    // Initial fetch and render
    fetchAppointmentsAndRenderCalendar();
  </script>
</body>

</html>
