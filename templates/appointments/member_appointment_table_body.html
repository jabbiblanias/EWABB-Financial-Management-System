{% for appointment in appointments %}
<tr id="row-{{ appointment.appointment_id }}">
    <td class="px-6 py-3">{{ appointment.appointment_date }}</td>
    <td class="px-6 py-3">{{ appointment.appointment_time }}</td>
    <td class="px-6 py-3">{{ appointment.appointment_type }}</td>
    <td class="px-6 py-3">{{ appointment.status }}</td>
</tr>
{% endfor %}
