{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWABB Dashboard</title>
  {% tailwind_css %}
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
<!-- Sidebar -->
      <aside class="w-64 max-h-screen bg-white shadow">
        <div class="p-6 text-2xl font-bold text-[#1f2b6c]">EWABB</div>
        <nav class="mt-6">
          <a href="{% url 'dashboard' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Dashboard </a>
          <a href="{% url 'transactions' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Transactions</a>
            <a href="{% url 'membershipApplication' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Members</a>
          <a href="{% url 'financial_report' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"> <span class="w-5 mr-3 inline-block"></span>Financial Reports </a>
             <a href="{% url 'loans' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Loans</a>
           <a href="{% url 'appointments' %}" class="flex items-center px-6 py-3 text-[#3d5af1] font-semibold bg-[#f1f5ff]">  <span class="w-5 mr-3 inline-block"></span> Appointmnets</a>
          <a href="{% url 'programs' %}" class="flex items-center px-6 py-3 text-gray-600 hover:text-[#3d5af1]"><span class="w-5 mr-3 inline-block"></span>Programs</a>
                  

                </nav>
      </aside>
    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
      <!-- Top bar -->
      <header class="flex justify-between items-center px-6 py-4 border-b border-gray-200 bg-white">
        <h2 class="text-lg font-semibold">Appointments</h2>
        <div class="flex items-center space-x-4">
          <input type="text" placeholder="Search for member" class="px-4 py-2 border border-gray-300 rounded-full w-64" />
          <div class="w-10 h-10 rounded-full bg-gray-200"></div>
          <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-500 text-white flex items-center justify-center rounded-full font-semibold">BK</div>
            <span class="text-sm">Bookkeeper</span>
          </div>
        </div>
      </header>

      <!-- Tabs -->
      <div class="px-6 pt-4">
        <div class="flex border-b border-gray-200">
          <button class="px-4 py-2 text-blue-600 font-medium border-b-2 border-blue-600">Appointment Requests</button>
          <button class="px-4 py-2 text-gray-500 hover:text-blue-600">Upcoming Appointments</button>
        </div>
      </div>

      <!-- Table -->
      <div class="px-6 py-4">
        <div class="border border-gray-200 rounded-md overflow-hidden">
          <table class="min-w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Member Name</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Appointment Type</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Date & Time</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Aproval</th>
              </tr>
            </thead>
            <tbody class="bg-white">
              <tr class="border-b border-gray-200">
               <td class="px-4 py-3">Alexander Buates</td>
                <td class="px-4 py-3">Personal Loan</td>
                <td class="px-4 py-3">August 16,2025 3:00 pm</td>
                <td class="px-4 py-3 flex space-x-2">
                  <button class="w-6 h-6 border border-green-500 text-green-500 rounded-full flex items-center justify-center">✓</button>
                  <button class="w-6 h-6 border border-red-500 text-red-500 rounded-full flex items-center justify-center">✕</button>
                </td>
              </tr>
              <tr><td class="px-4 py-6" colspan="6"></td></tr>
              <tr><td class="px-4 py-6" colspan="6"></td></tr>
            </tbody>
          </table>
        </div>

       <!-- Pagination -->
    <div class="flex justify-end items-center space-x-2 mt-4">
      <button class="text-blue-600 hover:underline">Previous</button>
      <button class="px-3 py-1 rounded-full bg-blue-600 text-white">1</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">2</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">3</button>
      <button class="px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">4</button>
      <button class="text-blue-600 hover:underline">Next</button>
    </div>


      </div>
    </div>
  </div>
</body>
</html>
