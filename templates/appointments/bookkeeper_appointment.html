{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EWABB Dashboard</title>
  {% tailwind_css %}
  <script src="{% static 'partials/table-utils.js' %}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      fillTableRows('myTable', 10);
    });
  </script>
</head>

<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
    {% include 'dashboard/partials/bookkeeper_nav.html' %}

    <!-- Main Content -->
    <div class="p-6 ml-64 mr-4 mt-[72px] flex-1">

      <!-- Tabs -->
      <div class="px-6 pt-4">
        <div class="flex border-b border-gray-200">
          <button class="px-4 py-2 text-blue-600 font-medium border-b-2 border-blue-600">Appointment Requests</button>
          <button class="px-4 py-2 text-gray-500 hover:text-blue-600">Upcoming Appointments</button>
        </div>
      </div>

      <!-- Table -->
      <div class="px-6 py-4">
        <div class="border border-gray-200 rounded-md overflow-hidden">
          <table id="myTable" class="min-w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Appointment ID</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Account Number</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Member Name</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Appointment Type</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Date</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Time</th>
                <th class="px-6 py-3 text-left font-medium text-gray-600">Approval</th>
              </tr>
            </thead>
            <tbody class="bg-white">
              {% include 'appointments/partials/appointment_request_table_body.html' %}
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="px-6 py-4 text-sm text-gray-500 flex justify-end items-center space-x-4">
          <button class="text-blue-500">&lt; Previous</button>
          <button class="w-6 h-6 bg-blue-600 text-white rounded text-xs">1</button>
          <button class="text-blue-500">2</button>
          <button class="text-blue-500">3</button>
          <button class="text-blue-500">4</button>
          <button class="text-blue-500">Next &gt;</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
